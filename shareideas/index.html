<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShareIdeas — Home</title>
    <link rel="stylesheet" href="/shareideas/shareideas.css" />
    <style>
      .landing {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .landing-card {
        width: min(760px, 100%);
        border: 1px solid #5c291f55;
        border-radius: 20px;
        padding: 20px;
        background: linear-gradient(135deg, #6e3d23 0%, #7a3a2f 52%, #86373e 100%);
        color: #fff;
        box-shadow: 0 10px 30px #572a2559;
        display: grid;
        gap: 14px;
        text-align: center;
      }
      .landing-card h1 { margin: 0; font-size: clamp(30px, 8vw, 56px); letter-spacing: 0.04em; }
      .landing-card p { margin: 0; font-size: 14px; opacity: 0.95; }
      .landing-actions { display: flex; justify-content: center; }
      .create-btn {
        appearance: none;
        border: 1px solid #ffffff57;
        border-radius: 999px;
        padding: 10px 22px;
        background: #ffffff1f;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <section class="landing-card">
        <p>By Fadhil Akbar</p>
        <h1>ShareIdeas</h1>
        <p>Buat workspace publik baru tanpa login, langsung siap dipakai.</p>
        <div class="landing-actions">
          <button class="create-btn" id="create-new" type="button">Create new</button>
        </div>
      </section>
    </main>

    <script type="module">
      import { createWorkspace, goToWorkspace } from '/library/fadhilweblib/fadhilwebideaslib/runtime.js';

      const createBtn = document.getElementById('create-new');
      createBtn?.addEventListener('click', async () => {
        if (createBtn.disabled) return;
        createBtn.disabled = true;
        try {
          const id = await createWorkspace();
          goToWorkspace(id);
        } catch (error) {
          createBtn.disabled = false;
          window.alert(error instanceof Error ? error.message : 'Gagal membuat workspace baru.');
        }
      });
    </script>
  </body>
</html>
