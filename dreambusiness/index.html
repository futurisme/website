<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamBusiness</title>
    <link rel="stylesheet" href="/dreambusiness/styles.css" />
  </head>
  <body data-fwlb-theme="utility">
    <main class="shell">
      <section id="frameMain" class="frame frame-active">
        <header class="header">
          <h1>DreamBusiness</h1>
          <p>Mainframe • business simulator dari dream-engine.</p>
          <div class="actions">
            <button id="tick1">Simulate 1 Tick</button>
            <button id="tick25">Simulate 25 Tick</button>
            <button id="auto">Start Auto</button>
            <button id="reset">Reset</button>
            <button id="toFullframe">Companies</button>
          </div>
        </header>

        <section class="stats" id="stats"></section>
        <section class="card controls">
          <h2>Interactive Command Deck</h2>
          <div class="control-grid">
            <div>
              <label>Company</label>
              <select id="companySelect"></select>
            </div>
            <div>
              <label>Trade Value (M$)</label>
              <input id="tradeAmount" type="number" min="0.1" step="0.1" value="2" />
            </div>
            <div class="button-row">
              <button id="buyBtn">Buy (Auto Route)</button>
              <button id="sellBtn">Sell (Auto Route)</button>
            </div>
            <div class="button-row">
              <button id="investPlanBtn">Invest Company Plan</button>
              <button id="licenseBtn">Request AppStore License</button>
              <button id="communityBtn">Seed Community Plan</button>
            </div>
          </div>
          <p id="actionStatus" class="status"></p>
        </section>

        <section class="grid">
          <article class="card">
            <h2>Top Company Snapshot</h2>
            <ul id="companies"></ul>
          </article>

          <article class="card">
            <h2>Activity Feed (Latest)</h2>
            <ul id="feed"></ul>
          </article>
        </section>
      </section>

      <section id="frameFull" class="frame">
        <button id="backFromFull" class="frame-back" aria-label="Back to mainframe">↩</button>
        <article class="card fullframe">
          <h2>Companies Fullframe</h2>
          <p>Klik salah satu card company untuk masuk ke Subfullframe detail.</p>
          <div id="companyFrameList" class="company-frame-list"></div>
        </article>
      </section>

      <section id="frameSub" class="frame">
        <button id="backFromSub" class="frame-back" aria-label="Back to fullframe">↩</button>
        <article class="card fullframe">
          <h2 id="companyDetailTitle">Company Subfullframe</h2>
          <div id="companyDetailBody" class="company-detail-body"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/dreambusiness/app.js"></script>
  </body>
</html>
