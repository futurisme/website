<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeIndustry</title>
    <link rel="canonical" href="https://fadhil.dev/games/animeindustry" />
    <meta name="description" content="Simulasi bisnis anime Jepang: register karier, bangun IP, produksi, dan rilis." />
    <link rel="stylesheet" href="/library/fadhilweblib/styles/theme.css" />
    <link rel="stylesheet" href="/library/fadhilweblib/fadhilwebgamelib/industry-engine/industry-ui.css" />
  </head>
  <body data-fwlb-theme="utility">
    <main id="animeIndustryApp" class="industry-shell">
      <section id="frameRegister" class="frame frame-active">
        <article class="industry-panel">
          <h1>AnimeIndustry</h1>
          <p>Register dulu untuk mulai simulasi.</p>
          <label>Nama</label>
          <input id="registerName" type="text" placeholder="Masukkan nama" />
          <label>Profesi awal</label>
          <select id="registerProfession">
            <option>Mangaka</option>
            <option>Novelis</option>
            <option>Animator</option>
          </select>
          <button data-action="register">Mulai Simulasi</button>
        </article>
      </section>

      <section id="frameMain" class="frame">
        <article class="industry-panel">
          <div class="topline">
            <h1>Mainframe</h1>
            <small id="topDate"></small>
          </div>
          <div id="industryStats" class="industry-stats"></div>
          <div class="industry-toolbar">
            <button data-action="tick-1">+1 Day</button>
            <button data-action="tick-7">+7 Day</button>
            <button data-action="brainstorm">Brainstorm IP</button>
            <button data-action="toggle-auto">Auto</button>
            <button data-action="to-full-profile" data-frame-target="fullProfile">Profile</button>
            <button data-action="to-full-projects" data-frame-target="fullProjects">Projects</button>
            <button data-action="to-full-admin" data-frame-target="fullAdmin">CEO/Admin</button>
            <button data-action="to-full-feed" data-frame-target="fullFeed">Feed</button>
          </div>
        </article>
      </section>


      <section id="frameFullProfile" class="frame">
        <article class="industry-panel">
          <div class="topline"><h2>Profile Fullframe</h2><button data-action="back-main">↩</button></div>
          <div id="industryProfile" class="industry-stats"></div>
        </article>
      </section>

      <section id="frameFullProjects" class="frame">
        <article class="industry-panel">
          <div class="topline"><h2>Projects Fullframe</h2><button data-action="back-main">↩</button></div>
          <div id="industryProjects" class="industry-projects"></div>
        </article>
      </section>

      <section id="frameFullAdmin" class="frame">
        <article class="industry-panel">
          <div class="topline"><h2>CEO/Admin Fullframe</h2><button data-action="back-main">↩</button></div>
          <div id="ceoStatus"></div>
          <div class="industry-toolbar">
            <button data-action="seek-funding">Cari Pendanaan</button>
            <button data-action="improve-admin">Upgrade Administrasi</button>
          </div>
          <label>Nama Studio Baru</label>
          <input id="studioNameInput" type="text" placeholder="Contoh: Aurora Frame Studio" />
          <button data-action="found-studio">Jadi CEO Studio</button>
        </article>
      </section>

      <section id="frameFullFeed" class="frame">
        <article class="industry-panel">
          <div class="topline"><h2>Feed Fullframe</h2><button data-action="back-main">↩</button></div>
          <ul id="industryFeed" class="industry-feed"></ul>
          <h3>Releases</h3>
          <ul id="industryReleases" class="industry-releases"></ul>
        </article>
      </section>

      <section id="frameSubProject" class="frame">
        <article class="industry-panel">
          <div class="topline"><h2 id="subProjectTitle">Project</h2><button data-action="back-projects">↩</button></div>
          <div id="subProjectBody"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/games/animeindustry/app.js"></script>
  </body>
</html>
