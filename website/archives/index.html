<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fadhil Akbar Cariearsa | Generalist & Student of the Craft</title>
    <meta name="description" content="Fadhil Akbar Cariearsa: A trilingual hobbyist generalist in development, writing, cybersecurity, editing, and analysis. A student of the craft." />
    <link rel="canonical" href="https://fadhil.dev/archives" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fadhil Akbar Cariearsa | Generalist & Student of the Craft" />
    <meta property="og:description" content="Fadhil Akbar Cariearsa: A trilingual hobbyist generalist in development, writing, cybersecurity, editing, and analysis. A student of the craft." />
    <meta property="og:url" content="https://fadhil.dev/archives" />
    <meta property="og:site_name" content="Fadhil Akbar Cariearsa" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fadhil Akbar Cariearsa | Generalist & Student of the Craft" />
    <meta name="twitter:description" content="Fadhil Akbar Cariearsa: A trilingual hobbyist generalist in development, writing, cybersecurity, editing, and analysis. A student of the craft." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "Fadhil Archives",
        "url": "https://fadhil.dev/archives",
        "description": "Ruang arsip modern untuk membuat dan mengelola arsip .fadhil."
      }
    </script>
    <link rel="stylesheet" href="/archives/archives.css" />
    <link rel="icon" href="/fadhil-512x512.png" sizes="512x512" type="image/png" />
    <link rel="alternate icon" href="/fadhil.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="archives-page" id="archives-app">
      <header class="compact-header">
        <h1>Fadhil Archives</h1>
        
      </header>

      <section class="compact-block" aria-label="Archive media and embed">
        <article class="embed-spotlight">
          <h3>YouTube Playlist Spotlight</h3>
                    <div class="embed-banner-row">
            <button type="button" id="playlist-banner-prev" class="banner-nav" aria-label="Banner sebelumnya">←</button>
            <a class="embed-banner-link" target="_blank" rel="noopener noreferrer" href="https://www.youtube.com/playlist?list=PLxFmUU-8D-UbX24xnBaf64-mqoRZjsqdf">
              <img
                class="embed-banner"
                id="playlist-banner"
                src="https://i.ytimg.com/pl_c/PLxFmUU-8D-UbX24xnBaf64-mqoRZjsqdf/studio_square_thumbnail.jpg?sqp=CJTi288G-oaymwEICKoDEPABSFqi85f_AwYI1vjbzwY=&rs=AOn4CLCj5f7rzUP0Pwu1L4B8u7XUra5ABQ"
                alt="Banner playlist YouTube"
                loading="eager"
                decoding="async"
                fetchpriority="high"
              />
            </a>
            <button type="button" id="playlist-banner-next" class="banner-nav" aria-label="Banner berikutnya">→</button>
          </div>
          <div class="embed-frame-wrap">
            <iframe
              title="YouTube Playlist Embed"
              src="https://www.youtube.com/embed/videoseries?list=PLxFmUU-8D-UbX24xnBaf64-mqoRZjsqdf"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
        </article>
      </section>

      <section class="compact-block" aria-label="Search archives">
        <input id="archive-search" type="search" placeholder="Search" autocomplete="off" />
      </section>

      <section class="compact-block" aria-label="List of archives">
        <div class="section-head">
          <h2>List of archives</h2>
          <div class="toolbar-inline">
                        <button id="manual-open-btn" type="button">Manual Save/Load</button>
          </div>
        </div>
        <div class="archives-scroll" role="region" aria-label="Archives list scroll container">
          <ul id="archives-list" class="list"></ul>
        </div>
              </section>


      
      <section class="compact-action" aria-label="Create archive">
        <button id="create-archive-btn" type="button">Create a new archive</button>
      </section>

      <footer class="compact-footer">© 2026 Fadhil Akbar Cariearsa. Some Rights Reserved.</footer>
    </main>

    <dialog id="manual-modal" class="manual-modal">
      <form method="dialog" class="manual-content">
        <div class="section-head">
          <h2>Manual Save/Load (All Archives)</h2>
          <button id="manual-close" type="submit">Close</button>
        </div>
        <p class="hint">Berisi snapshot <strong>List of archives</strong> + isi masing-masing arsip secara original, dengan format <strong>.fadhil</strong>.</p>
        <div class="toolbar">
          <button id="manual-generate" type="button">Generate Snapshot</button>
          <button id="manual-copy" type="button">Copy Snapshot</button>
          <button id="manual-apply" type="button">Load Snapshot</button>
        </div>
        <label for="manual-container">.fadhil container</label>
        <textarea id="manual-container" rows="14" placeholder="Container save/load semua archives muncul di sini"></textarea>
        <p id="manual-status" class="hint"></p>
      </form>
    </dialog>

    <script type="module" src="/archives/archives.js"></script>
  </body>
</html>
