<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books</title>
    <link rel="stylesheet" href="/Books/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1 data-slot="book-title">Books</h1>
        <a class="btn" href="/Books/Editor">Editor Buku</a>
      </header>

      <section class="bookstage" aria-label="Book viewer">
        <p class="book-hint">Canvas flipbook: swipe-hold bisa dari tengah atau tepi. Kanan→kiri next, kiri→kanan previous.</p>
        <div class="page-frame" data-slot="page-frame">
          <canvas class="book-canvas" data-slot="book-canvas" aria-label="Canvas flipbook"></canvas>
        </div>
      </section>

      <footer class="statusbar">
        <p class="counter" data-slot="page-number">1 / 1</p>
      </footer>
    </main>

    <script type="module">
      import { FadhilEBookLite, loadBook } from '/Books/lib/fadhilebooklib.browser.js';
      const root = document.querySelector('.shell');
      const engine = new FadhilEBookLite(root, loadBook(), {
        duration: 240,
        edgeStartRatio: 0.16,
        minDragDistance: 14,
        centerStartEnabled: true,
        centerDragPenalty: 1.35,
        releaseProgress: 0.32,
        velocityThreshold: 0.48,
        meshSegments: 30
      });
      window.addEventListener('storage', () => engine.setBook(loadBook()));
    </script>
  </body>
</html>
