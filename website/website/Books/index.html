<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books</title>
    <link rel="stylesheet" href="/Books/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1 data-slot="book-title">Books</h1>
        <a class="btn" href="/Books/Editor">Editor Buku</a>
      </header>

      <section class="bookstage" aria-label="Book viewer">
        <p class="book-hint">Smart gesture: swipe/drag kiri-kanan untuk flip satu lembar 9:16, tap sisi kiri/kanan untuk pindah 1 halaman.</p>
        <div class="page-frame" data-slot="page-frame" data-dragging="0">
          <article class="page page-current" data-slot="page-current">
            <h2 data-slot="title"></h2>
            <p data-slot="content"></p>
          </article>
          <article class="page page-flip" data-slot="page-flip" aria-hidden="true">
            <h2 data-slot="title"></h2>
            <p data-slot="content"></p>
          </article>
        </div>
      </section>

      <footer class="statusbar">
        <p class="counter" data-slot="page-number">1 / 1</p>
      </footer>
    </main>

    <script type="module">
      import { FadhilEBookLite, loadBook } from '/Books/lib/fadhilebooklib.browser.js';
      const root = document.querySelector('.shell');
      const engine = new FadhilEBookLite(root, loadBook(), {
        duration: 240,
        dragThreshold: 0.24,
        tapZoneRatio: 0.2,
        velocityThreshold: 0.45
      });
      window.addEventListener('storage', () => engine.setBook(loadBook()));
    </script>
  </body>
</html>
