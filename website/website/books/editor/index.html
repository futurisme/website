    <meta charset="UTF-8" />

    <link rel="canonical" href="https://fadhil.dev/books/editor" />
    <meta property="og:site_name" content="Fadhil Akbar Cariearsa" />
    <meta property="og:title" content="Fadhil Akbar Cariearsa | Generalist & Student of the Craft" />
    <meta name="twitter:title" content="Fadhil Akbar Cariearsa | Generalist & Student of the Craft" />
    <meta name="description" content="Fadhil Akbar Cariearsa: A trilingual hobbyist generalist in development, writing, cybersecurity, editing, and analysis. A student of the craft." />
    <meta property="og:description" content="Fadhil Akbar Cariearsa: A trilingual hobbyist generalist in development, writing, cybersecurity, editing, and analysis. A student of the craft." />

  <body>
    <main class="editor-shell">
      <header>
        <h1>Books Editor</h1>
        <a class="btn" href="/books">Kembali ke books</a>
      </header>

      <section class="panel">
        <label class="row">Judul Buku
          <input id="book-title" type="text" />
        </label>
        <label class="row">Data Halaman (JSON)
          <textarea id="book-pages" spellcheck="false"></textarea>
        </label>
        <p class="hint">Tips: viewer menampilkan rasio book container 16:9 dengan gesture hold + drag dari tepi halaman.</p>
        <div class="actions">
          <button id="format-json" class="btn" type="button">Format JSON</button>
          <button id="save-book" class="btn btn-primary" type="button">Simpan Buku</button>
        </div>
      </section>
    </main>

    <script type="module" src="/books/editor/editor.js"></script>
  </body>
</html>
