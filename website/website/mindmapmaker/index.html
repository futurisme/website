<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Mindmapmaker</title>
<style>:root{--n:#0b1f5c;--bg:#f4f6fc;--w:#fff;--line:#d8e2ff;--ink:#0a1230}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}body{padding-bottom:46px;user-select:none;-webkit-user-select:none}.top{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:.52rem .9rem;background:#fff;border:2px solid #0b1f5c;border-left:0;border-right:0}.profile,.auth-btn{border:1px solid var(--n);background:var(--n);color:#fff;border-radius:9px;padding:.42rem .72rem;font-size:.82rem;font-weight:700}.profile{display:none;width:38px;height:38px;border-radius:999px;background:#fff;color:var(--n);padding:0;align-items:center;justify-content:center}
.shell{max-width:1100px;margin:0 auto;padding:1rem}.page{display:none}.page.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:1rem}.grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem}.row{display:flex;gap:.5rem;flex-wrap:wrap}.input{width:100%;padding:.7rem;border:1px solid #bfd0ff;border-radius:10px;user-select:text;-webkit-user-select:text}.btn{border:1px solid var(--n);background:var(--n);color:#fff;border-radius:9px;padding:.55rem .86rem;font-weight:700}.btn.ghost{background:#fff;color:var(--n)}.list{display:grid;gap:.6rem}.item{border:1px solid var(--line);border-radius:11px;padding:.65rem .75rem;background:#fbfcff;display:flex;justify-content:space-between;align-items:center}.small{font-size:.88rem;color:#4e5c80}
.auth,.profile-sheet{display:none;pointer-events:none;position:fixed;inset:0;z-index:40;background:rgba(6,10,28,.52)}.open{display:block;pointer-events:auto}.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(420px,100% - 2rem);background:#fff;border:1px solid var(--line);border-radius:14px;padding:1rem}
.switch{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:.8rem}.switch button{border:0;padding:.55rem;background:#fff;color:var(--n);font-weight:700}.switch .active{background:var(--n);color:#fff}
.profile-panel{position:absolute;inset:0;background:#fff;overflow:auto}.profile-head{display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}.icon-back{width:34px;height:34px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:1.05rem}.profile-body{max-width:1100px;margin:0 auto;padding:1rem;display:grid;gap:1rem}
.contrib-grid{display:grid;grid-template-columns:repeat(26,minmax(10px,1fr));gap:4px}.cell{aspect-ratio:1;border-radius:2px;background:#ebedf0}.lv1{background:#9be9a8}.lv2{background:#40c463}.lv3{background:#30a14e}.lv4{background:#216e39}
.pie-wrap{display:grid;grid-template-columns:120px 1fr;gap:1rem;align-items:center}.pie{width:120px;height:120px;border-radius:999px;background:conic-gradient(#2563eb 0 33%, #16a34a 33% 66%, #9333ea 66% 100%);border:1px solid var(--line)}
.toast{position:fixed;top:8px;left:50%;transform:translate(-50%,-80px);background:#0b1f5c;color:#fff;padding:.65rem .9rem;border-radius:10px;z-index:90;opacity:0;transition:all .32s}.toast.show{transform:translate(-50%,0);opacity:1}.toast.warn{background:#b91c1c}.bottom{position:fixed;left:0;right:0;bottom:0;height:42px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:35}.nav-btn{border:0;background:transparent;color:var(--n);font-size:.75rem;display:grid;place-items:center;cursor:pointer}.nav-btn.active{background:#eef3ff}
@media(max-width:860px){.grid{grid-template-columns:1fr}.pie-wrap{grid-template-columns:1fr}}
</style></head><body>
<header class="top"><strong style="font-size:1.55rem;letter-spacing:.01em">MINDMAPMAKER</strong><div><button id="auth-action" class="auth-btn">Login/Register</button><button id="profile-btn" class="profile"></button></div></header>
<main class="shell"><section id="page-home" class="page active"><div class="grid"><article class="card"><h2>Home</h2><label>Map ID</label><div class="row"><input id="map-id" class="input" type="number" value="1" min="1"/><button id="continue-map" class="btn">Continue</button></div><div class="row" style="margin-top:.6rem"><button id="create-map" class="btn ghost">Create New</button><button id="open-last" class="btn ghost">Open Last</button><a id="text-mode" class="btn ghost" href="#">Text/Format Editor</a></div><div id="launch-status" class="small"></div></article><aside class="card"><button id="logout" class="btn ghost" style="display:none">Logout</button></aside></div></section><section id="page-mindmaps" class="page"><div class="card"><h2>Mindmaps</h2><div id="mindmap-list" class="list"></div></div></section><section id="page-peoples" class="page"><div class="card"><h2>Peoples</h2><div id="peoples-list" class="list"></div></div></section><section id="page-information" class="page"><div class="card"><h2>Informations</h2><div class="list"><div class="item">Supabase + Cloudflare docs</div></div></div></section></main>
<section id="auth-modal" class="auth"><form id="auth-form" class="modal"><div class="switch"><button id="tab-login" type="button" class="active">Login</button><button id="tab-register" type="button">Register</button></div><label>Nama</label><input id="name" class="input" type="text" autocomplete="username" required/><label id="password-label">Buat Sandi</label><input id="password" class="input" type="password" minlength="8" autocomplete="current-password" required/><div class="row" style="margin-top:.7rem"><button id="submit-auth" class="btn" type="submit">Login</button><button type="button" id="close-modal" class="btn ghost">Close</button></div><div id="auth-status" class="small"></div></form></section>
<section id="profile-sheet" class="profile-sheet"><div class="profile-panel"><div class="profile-head"><button id="profile-back" class="icon-back" aria-label="Back">←</button><strong>Profil & Kontribusi</strong></div><div class="profile-body"><div class="card"><h2 style="margin-top:0">Profile</h2><div id="profile-username" class="small"></div><div class="small">Jumlah Mindmap: <span id="map-count">0</span></div><div id="profile-map-list" class="list" style="margin-top:.6rem"></div></div><div class="card"><h3 style="margin-top:0">Contribution Graph</h3><div id="contrib-total" class="small"></div><div id="contrib-grid" class="contrib-grid"></div></div><div class="card"><h3 style="margin-top:0">Activity Pie</h3><div class="pie-wrap"><div id="pie" class="pie"></div><div id="pie-legend" class="small"></div></div></div></div></div></section>
<div id="toast" class="toast"></div><nav class="bottom"><button class="nav-btn active" data-page="home">⌂<span>Home</span></button><button class="nav-btn" data-page="mindmaps">◉<span>Mindmaps</span></button><button class="nav-btn" data-page="peoples">◌<span>Peoples</span></button><button class="nav-btn" data-page="information">ⓘ<span>Information</span></button></nav>
<script type="module">import { summarizeMindmap, rankMindmaps, classifyContributionActivity } from '/mindmapmaker/summary-engine.js?v=20260514b';
const $=(i)=>document.getElementById(i),state={cfg:null,mode:'login'};
function notify(msg,type='ok'){const t=$('toast');t.textContent=msg;t.className=`toast show ${type==='warn'?'warn':''}`;clearTimeout(notify._tm);notify._tm=setTimeout(()=>t.className='toast',2200);}
const mapsKey='mindmapmaker:created_maps',actKey='mindmapmaker:activity_log';const pages=['home','mindmaps','peoples','information'];
const addActivity=(type,delta=1)=>{const d=new Date().toISOString().slice(0,10);const list=JSON.parse(localStorage.getItem(actKey)||'[]');list.push({d,type,delta,t:Date.now()});localStorage.setItem(actKey,JSON.stringify(list.slice(-4000)));};
function buildContribution(){const list=JSON.parse(localStorage.getItem(actKey)||'[]');const stats=classifyContributionActivity(list);const days=[];for(let i=181;i>=0;i--){const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);days.push({d,c:stats.byDay.get(d)||0});}$('contrib-total').textContent=`Total kontribusi 6 bulan: ${stats.total}`;$('contrib-grid').innerHTML=days.map(x=>`<div class="cell ${x.c>14?'lv4':x.c>8?'lv3':x.c>4?'lv2':x.c>0?'lv1':''}" title="${x.d}: ${x.c}"></div>`).join('');}
function buildPie(){const list=JSON.parse(localStorage.getItem(actKey)||'[]');const stats=classifyContributionActivity(list);const sum=Math.max(1,stats.node_add+stats.text_add+stats.link_add+stats.edit+stats.other);const a=(stats.node_add/sum)*360,b=(stats.text_add/sum)*360,c=(stats.link_add/sum)*360,d=(stats.edit/sum)*360;$('pie').style.background=`conic-gradient(#2563eb 0 ${a}deg,#16a34a ${a}deg ${a+b}deg,#9333ea ${a+b}deg ${a+b+c}deg,#f59e0b ${a+b+c}deg ${a+b+c+d}deg,#ef4444 ${a+b+c+d}deg 360deg)`;$('pie-legend').innerHTML=`Node+: ${stats.node_add}<br>Text+: ${stats.text_add}<br>Link+: ${stats.link_add}<br>Edit: ${stats.edit}<br>Lainnya: ${stats.other}`;}
function setPage(p){for(const id of pages){$(`page-${id}`).classList.toggle('active',id===p)}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===p));if(p==='mindmaps')renderMindmaps();if(p==='peoples')loadPeoples();}
document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>setPage(b.dataset.page));
const parseMaps=()=>JSON.parse(localStorage.getItem(mapsKey)||'[]');const saveMap=(id)=>{const s=new Set(parseMaps());s.add(Number(id));localStorage.setItem(mapsKey,JSON.stringify([...s]));addActivity('node_add',1)};
const goto=(v)=>{const id=Number(v);const safe=Number.isInteger(id)&&id>0?id:1;localStorage.setItem('mindmapmaker:lastMapId',String(safe));location.href=`/mindmapmaker/edit/${safe}`};
async function getConfig(){if(state.cfg)return state.cfg;const f={supabaseUrl:localStorage.getItem('mindmapmaker:supabase_url')||'',supabaseAnonKey:localStorage.getItem('mindmapmaker:supabase_anon')||''};try{const r=await fetch('/api/mindmapmaker/auth-config',{cache:'no-store'});const d=await r.json();if(r.ok&&d.ok){state.cfg=d;localStorage.setItem('mindmapmaker:supabase_url',d.supabaseUrl);localStorage.setItem('mindmapmaker:supabase_anon',d.supabaseAnonKey);return d;}}catch{}if(f.supabaseUrl&&f.supabaseAnonKey){state.cfg=f;return f;}throw new Error('Auth config tidak ditemukan.');}
async function authRequest(path,body){const {supabaseUrl,supabaseAnonKey}=await getConfig();const r=await fetch(`${supabaseUrl}/auth/v1/${path}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':supabaseAnonKey},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.msg||d.error_description||d.error||'Auth gagal');return d;}
function mapSnapshot(id){try{return JSON.parse(localStorage.getItem(`mindmap:${id}`)||'null')}catch{return null;}}
function renderMindmaps(){const ids=rankMindmaps(parseMaps().map(id=>{const snap=mapSnapshot(id);return{id,updatedAt:(snap?.version||0)+id,nodeCount:Array.isArray(snap?.nodes)?snap.nodes.length:0,snap};}));$('mindmap-list').innerHTML=ids.map(({id,snap})=>`<div class="item"><a href="/mindmapmaker/edit/${id}">Mindmap #${id}</a><span class="small">${summarizeMindmap(snap||{nodes:[{label:'Node Utama'}],links:[]})}</span></div>`).join('')||'<div class="item">Belum ada mindmap.</div>';$('profile-map-list').innerHTML=ids.map(({id})=>`<a class="item" href="/mindmapmaker/edit/${id}">Mindmap #${id}<span>›</span></a>`).join('')||'<div class="item">Belum ada mindmap.</div>';$('map-count').textContent=String(ids.length);buildContribution();buildPie();}
async function loadPeoples(){const host=$('peoples-list');host.innerHTML='<div class="item">Memuat pengguna...</div>';try{const r=await fetch('/api/mindmapmaker/peoples',{cache:'no-store'});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);if(d.externalNotice==='missing_table'){host.innerHTML='<div class="item">Tabel user_profiles belum tersedia di Supabase. Lihat instruksi setup di catatan deploy.</div>';return;}if(d.externalNotice==='missing_config'){host.innerHTML='<div class="item">Konfigurasi Supabase belum lengkap di server.</div>';return;}if(d.externalNotice==='rest_unavailable'){host.innerHTML='<div class="item">Layanan data Supabase sementara tidak tersedia. Coba lagi beberapa saat.</div>';return;}const rows=Array.isArray(d.rows)?d.rows:[];host.innerHTML=rows.map(u=>`<div class="item"><strong>${u.display_name||u.id}</strong><span><button class="btn ghost">Friend Request</button> <button class="btn">Grant Access</button></span></div>`).join('')||'<div class="item">Tidak ada data user_profiles.</div>';}catch(e){host.innerHTML=`<div class="item">Gagal memuat users: ${e.message}</div>`;}}
function applyMode(){const l=state.mode==='login';$('tab-login').classList.toggle('active',l);$('tab-register').classList.toggle('active',!l);$('submit-auth').textContent=l?'Login':'Konfirmasi';$('password-label').textContent=l?'Sandi':'Buat Sandi';}
function syncUI(){const email=localStorage.getItem('mindmapmaker:user_email'),token=localStorage.getItem('mindmapmaker:access_token'),ok=Boolean(email&&token);$('logout').style.display=ok?'inline-block':'none';$('auth-action').style.display=ok?'none':'inline-block';$('profile-btn').style.display=ok?'inline-flex':'none';$('profile-btn').textContent=(email||'U')[0].toUpperCase();$('profile-username').textContent=`Username: ${email||'-'}`;renderMindmaps();}
$('auth-action').onclick=()=>$('auth-modal').classList.add('open');$('profile-btn').onclick=()=>{$('profile-sheet').classList.add('open');renderMindmaps();};$('profile-back').onclick=()=>$('profile-sheet').classList.remove('open');
$('close-modal').onclick=()=>$('auth-modal').classList.remove('open');$('tab-login').onclick=()=>{state.mode='login';applyMode()};$('tab-register').onclick=()=>{state.mode='register';applyMode()};
$('auth-form').onsubmit=async(e)=>{e.preventDefault();const email=$('name').value.trim(),password=$('password').value;try{if(state.mode==='login'){const res=await authRequest('token?grant_type=password',{email,password});localStorage.setItem('mindmapmaker:access_token',res.access_token||'');localStorage.setItem('mindmapmaker:user_email',res.user?.email||email);$('auth-modal').classList.remove('open');notify('Selamat datang, login berhasil.');syncUI();return;}await authRequest('signup',{email,password});state.mode='login';applyMode();$('auth-status').textContent='Register sukses. Silakan login.';}catch(err){$('auth-status').textContent=err.message;}};
$('logout').onclick=()=>{localStorage.removeItem('mindmapmaker:access_token');localStorage.removeItem('mindmapmaker:user_email');syncUI();};
$('continue-map').onclick=()=>{addActivity('other',1);goto($('map-id').value)};$('create-map').onclick=()=>{const id=Math.floor(Date.now()/1000);saveMap(id);$('launch-status').textContent=`Map baru dibuat: ${id}`;goto(id)};$('open-last').onclick=()=>{addActivity('other',1);goto(Number(localStorage.getItem('mindmapmaker:lastMapId')||1))};$('text-mode').onclick=(e)=>{e.preventDefault();const id=Number($('map-id').value||1);location.href=`/mindmapmaker/edit-text/${id>0?id:1}`;};
applyMode();syncUI();
</script></body></html>
