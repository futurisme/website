<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindmapmaker Menu</title>
    <meta name="description" content="Mindmapmaker menu with create/continue options." />
    <link rel="canonical" href="https://fadhil.dev/mindmapmaker" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mindmapmaker Menu" />
    <meta property="og:description" content="Buat mindmap baru atau lanjutkan workspace dengan editor ringan." />
    <meta property="og:url" content="https://fadhil.dev/mindmapmaker" />
    <meta property="og:site_name" content="Fadhil.Dev" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mindmapmaker Menu" />
    <meta name="twitter:description" content="Launcher editor mindmap cepat dan mobile-friendly." />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Mindmapmaker",
        "url": "https://fadhil.dev/mindmapmaker",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web"
      }
    </script>
    <style>
      html, body { margin: 0; min-height: 100%; background: #020617; color: #e2f8ff; }
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <link rel="preload" href="/mindmapmaker/theme.css" as="style" />
    <link rel="preload" href="/mindmapmaker/menu.css" as="style" />
    <link rel="stylesheet" href="/mindmapmaker/theme.css" />
    <link rel="stylesheet" href="/mindmapmaker/menu.css" />
    <link rel="icon" href="/fadhil-512x512.png" sizes="512x512" type="image/png" />
    <link rel="shortcut icon" href="/fadhil-512x512.png" type="image/png" />
    <link rel="icon" href="/fadhil.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/fadhil-512x512.png" sizes="512x512" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <main class="mindmap-shell" data-fwlb-theme="game" data-slot="theme-scope">
      <header class="panel hero">
        <p class="eyebrow">fadhilweblib + fadhilmindmaplib</p>
        <h1>Mindmapmaker</h1>
        <p class="copy">Create a new mind map or continue an existing workspace with a lightweight mobile-friendly editor.</p>
      </header>

      <section class="panel controls" aria-label="Editor launcher">
        <h2>Workspace launcher</h2>
        <div class="launch-grid">
          <button class="btn" id="create-map" type="button">Create New Mindmap</button>
          <div class="input-row">
            <label for="map-id" class="label">Continue map ID</label>
            <div class="row-wrap">
              <input id="map-id" class="input" type="number" min="1" step="1" value="1" required />
              <button class="btn" type="button" id="continue-map">Continue</button>
            </div>
          </div>
        </div>

        <nav class="shortcut-grid" aria-label="Quick map IDs">
          <a class="chip" href="/mindmapmaker/editor/1">Editor 1</a>
          <a class="chip" href="/mindmapmaker/editor/2">Editor 2</a>
          <a class="chip" href="/mindmapmaker/editor/10">Editor 10</a>
        </nav>
      </section>
    </main>

    <script type="module">
      const input = document.getElementById('map-id');
      const continueBtn = document.getElementById('continue-map');
      const createBtn = document.getElementById('create-map');

      const goto = (value) => {
        const id = Number(value);
        const safe = Number.isInteger(id) && id > 0 ? id : 1;
        window.location.href = `/mindmapmaker/editor/${safe}`;
      };

      continueBtn?.addEventListener('click', () => goto(input?.value || 1));
      createBtn?.addEventListener('click', () => goto(Math.floor(Date.now() / 1000)));
    </script>
  </body>
</html>
