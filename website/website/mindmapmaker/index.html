<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindmapmaker Dashboard | fadhil.dev</title>
    <meta name="description" content="Mindmapmaker dashboard." />
    <link rel="canonical" href="https://fadhil.dev/mindmapmaker" />
    <style>
      :root{--white:#fff;--ink:#050b1f;--navy:#0b1f5c;--line:#d9e3ff;--panel:#f8fbff;--muted:#445071}
      *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#fff,#f3f7ff);color:var(--ink)}
      body{font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
      .top{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.8rem;padding:.75rem 1rem;border-bottom:1px solid var(--line);background:var(--white);position:sticky;top:0;z-index:10}
      .brand{font-weight:800;letter-spacing:.04em;font-size:clamp(.92rem,2vw,1.05rem)}
      .auth-btn{border:1px solid var(--navy);background:var(--navy);color:#fff;border-radius:8px;padding:.42rem .72rem;font-size:.82rem;font-weight:700;cursor:pointer;line-height:1}
      .profile{display:none;width:34px;height:34px;border-radius:999px;border:1px solid var(--navy);background:#fff;color:var(--navy);font-size:.78rem;font-weight:800;align-items:center;justify-content:center;cursor:pointer}
      .shell{max-width:1100px;margin:0 auto;padding:1rem}
      .grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem}
      .card{border:1px solid var(--line);border-radius:14px;padding:.95rem 1.05rem;background:#fff}
      .label{display:block;margin:.45rem 0;color:var(--muted);font-size:.9rem}.input{width:100%;border:1px solid #bfd1ff;border-radius:10px;padding:.7rem .8rem}
      .row{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.68rem}.hint{color:var(--muted);font-size:.9rem}.status{margin-top:.45rem;min-height:1.3rem;color:var(--navy);font-size:.86rem}
      .btn{border:1px solid var(--navy);background:var(--navy);color:#fff;border-radius:9px;padding:.56rem .86rem;font-size:.86rem;font-weight:700;cursor:pointer}.btn.ghost{background:#fff;color:var(--navy)}
      .auth{display:none;position:fixed;inset:0;background:rgba(2,6,23,.58);padding:1rem}.auth.open{display:grid;place-items:center}
      .modal{width:min(420px,100%);background:#fff;border:1px solid var(--line);border-radius:14px;padding:1rem}
      .switch{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:.8rem}
      .switch button{padding:.5rem;border:0;background:#fff;color:var(--navy);font-weight:700;cursor:pointer}.switch button.active{background:var(--navy);color:#fff}
      @media (max-width:860px){.grid{grid-template-columns:1fr}.shell{padding:.8rem}}
    </style>
  </head>
  <body>
    <header class="top"><div class="brand">MINDMAPMAKER DASHBOARD</div><div><button id="auth-action" class="auth-btn">Login/Register</button><button id="profile-btn" class="profile" title="Profile"></button></div></header>
    <main class="shell">
      <section class="grid" aria-label="Dashboard area">
        <article class="card"><h2 style="margin:.2rem 0 .45rem;">Workspace Launcher</h2>
          <label class="label" for="map-id">Map ID</label><div class="row"><input id="map-id" class="input" type="number" min="1" step="1" value="1" /><button id="continue-map" class="btn">Continue</button></div>
          <div class="row"><button id="create-map" class="btn ghost">Create New</button><button id="open-last" class="btn ghost">Open Last</button></div><div id="launch-status" class="status"></div></article>
        <aside class="card"><h3 style="margin:.2rem 0 .45rem;">Session</h3><p id="session-text" class="hint">Belum login.</p><button id="logout" class="btn ghost" style="display:none;">Logout</button></aside>
      </section>
    </main>
    <section id="auth-modal" class="auth" aria-hidden="true"><form id="auth-form" class="modal"><div class="switch"><button id="tab-login" type="button" class="active">Login</button><button id="tab-register" type="button">Register</button></div><label class="label" for="name">Nama</label><input id="name" class="input" type="text" autocomplete="username" required /><label class="label" for="password">Buat Sandi</label><input id="password" class="input" type="password" minlength="8" required /><div class="row"><button class="btn" id="submit-auth" type="submit">Login</button><button class="btn ghost" type="button" id="close-modal">Close</button></div><div class="status" id="auth-status"></div></form></section>
    <script type="module">
      const $=(id)=>document.getElementById(id); const state={cfg:null,mode:'login'}; const authModal=$('auth-modal');
      const setStatus=(el,msg)=>el.textContent=msg;
      const goto=(v)=>{const id=Number(v);const safe=Number.isInteger(id)&&id>0?id:1;localStorage.setItem('mindmapmaker:lastMapId',String(safe));location.href=`/mindmapmaker/editor/${safe}`};
      async function getConfig(){ if(state.cfg) return state.cfg; const r=await fetch('/api/mindmapmaker/auth-config',{cache:'no-store'}); const d=await r.json(); if(!r.ok||!d.ok) throw new Error('Konfigurasi auth belum aktif.'); state.cfg=d; return d; }
      async function authRequest(path,body){ const {supabaseUrl,supabaseAnonKey}=await getConfig(); const r=await fetch(`${supabaseUrl}/auth/v1/${path}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':supabaseAnonKey},body:JSON.stringify(body)}); const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.msg||d.error_description||d.error||'Auth gagal.'); return d; }
      function applyMode(){ const isLogin=state.mode==='login'; $('tab-login').classList.toggle('active',isLogin); $('tab-register').classList.toggle('active',!isLogin); $('submit-auth').textContent=isLogin?'Login':'Konfirmasi'; }
      function syncUI(){ const email=localStorage.getItem('mindmapmaker:user_email'); const token=localStorage.getItem('mindmapmaker:access_token'); const logged=Boolean(email&&token); $('session-text').textContent=logged?`Login sebagai ${email}`:'Belum login.'; $('logout').style.display=logged?'inline-block':'none'; $('auth-action').style.display=logged?'none':'inline-block'; $('profile-btn').style.display=logged?'inline-flex':'none'; $('profile-btn').textContent=(email||'U').slice(0,1).toUpperCase(); }
      $('tab-login').addEventListener('click',()=>{state.mode='login';applyMode()}); $('tab-register').addEventListener('click',()=>{state.mode='register';applyMode()});
      $('auth-action').addEventListener('click',()=>authModal.classList.add('open')); $('profile-btn').addEventListener('click',()=>authModal.classList.add('open')); $('close-modal').addEventListener('click',()=>authModal.classList.remove('open'));
      $('auth-form').addEventListener('submit',async(e)=>{e.preventDefault();const name=$('name').value.trim();const password=$('password').value;try{ if(state.mode==='login'){setStatus($('auth-status'),'Memproses login...'); const res=await authRequest('token?grant_type=password',{email:name,password}); localStorage.setItem('mindmapmaker:access_token',res.access_token||''); localStorage.setItem('mindmapmaker:user_email',res.user?.email||name); setStatus($('auth-status'),'Login sukses.'); authModal.classList.remove('open'); syncUI(); return;} setStatus($('auth-status'),'Memproses register...'); await authRequest('signup',{email:name,password}); setStatus($('auth-status'),'Register sukses. Silakan login.'); state.mode='login'; applyMode(); }catch(err){setStatus($('auth-status'),err.message);}});
      $('logout').addEventListener('click',()=>{localStorage.removeItem('mindmapmaker:access_token');localStorage.removeItem('mindmapmaker:user_email');syncUI();});
      $('continue-map').addEventListener('click',()=>goto($('map-id').value)); $('create-map').addEventListener('click',()=>{const id=Math.floor(Date.now()/1000); setStatus($('launch-status'),`Map baru dibuat: ${id}`); goto(id)}); $('open-last').addEventListener('click',()=>goto(Number(localStorage.getItem('mindmapmaker:lastMapId')||1)));
      applyMode(); syncUI();
    </script>
  </body>
</html>
