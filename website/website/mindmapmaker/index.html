<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Mindmapmaker Dashboard</title>
<style>:root{--n:#0b1f5c;--w:#fff;--ink:#081027;--line:#d8e2ff}*{box-sizing:border-box}html,body{margin:0;background:linear-gradient(#fff,#f3f7ff);color:var(--ink);font-family:Inter,system-ui,sans-serif}body{padding-bottom:46px}.top{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;border-bottom:1px solid var(--line);background:#fff}.profile,.auth-btn{border:1px solid var(--n);border-radius:9px;background:var(--n);color:#fff;padding:.4rem .66rem;font-size:.8rem;font-weight:700}.profile{display:none;width:34px;height:34px;border-radius:999px;padding:0;align-items:center;justify-content:center;background:#fff;color:var(--n)}.shell{max-width:1120px;margin:0 auto;padding:1rem}.page{display:none}.page.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:.9rem}.grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem}.row{display:flex;gap:.5rem;flex-wrap:wrap}.input{width:100%;padding:.65rem .75rem;border:1px solid #bfd0ff;border-radius:10px}.btn{border:1px solid var(--n);background:var(--n);color:#fff;border-radius:9px;padding:.52rem .8rem;font-weight:700}.btn.ghost{background:#fff;color:var(--n)}.list{display:grid;gap:.6rem}.item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:.6rem .7rem;background:#f9fbff}.item a{text-decoration:none;color:var(--ink);font-weight:700}.small{font-size:.86rem;color:#4b587a}.auth,.profile-sheet{display:none;position:fixed;inset:0;background:rgba(3,9,25,.55);z-index:40}.open{display:block}.modal{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:min(420px,100% - 2rem);background:#fff;border:1px solid var(--line);border-radius:14px;padding:1rem}.switch{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:.8rem}.switch button{border:0;padding:.5rem;background:#fff;color:var(--n);font-weight:700}.switch .active{background:var(--n);color:#fff}.profile-panel{position:absolute;left:0;right:0;top:52px;bottom:46px;margin:0 auto;width:min(1120px,100%);background:#fff;padding:1rem;overflow:auto}.bottom{position:fixed;left:0;right:0;bottom:0;height:42px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:35}.nav-btn{border:0;background:transparent;color:var(--n);font-size:.75rem;display:grid;place-items:center;cursor:pointer}.nav-btn.active{background:#eef3ff} @media(max-width:860px){.grid{grid-template-columns:1fr}}</style></head>
<body><header class="top"><strong>MINDMAPMAKER</strong><div><button id="auth-action" class="auth-btn">Login/Register</button><button id="profile-btn" class="profile"></button></div></header>
<main class="shell">
<section id="page-home" class="page active"><div class="grid"><article class="card"><h2>Home</h2><label>Map ID</label><div class="row"><input id="map-id" class="input" type="number" value="1" min="1"/><button id="continue-map" class="btn">Continue</button></div><div class="row" style="margin-top:.6rem"><button id="create-map" class="btn ghost">Create New</button><button id="open-last" class="btn ghost">Open Last</button></div><div id="launch-status" class="small"></div></article><aside class="card"><h3>Session</h3><p id="session-text" class="small">Belum login.</p><button id="logout" class="btn ghost" style="display:none">Logout</button></aside></div></section>
<section id="page-mindmaps" class="page"><div class="card"><h2>Mindmaps</h2><p class="small">Daftar lengkap mindmap + rangkuman otomatis.</p><div id="mindmap-list" class="list"></div></div></section>
<section id="page-peoples" class="page"><div class="card"><h2>Peoples</h2><p class="small">Akun pengguna untuk Friend Request / Grant Access.</p><div id="peoples-list" class="list"></div></div></section>
<section id="page-information" class="page"><div class="card"><h2>Informations</h2><div class="list"><div class="item"><a href="https://supabase.com/docs" target="_blank">Supabase Docs</a><span>↗</span></div><div class="item"><a href="https://developers.cloudflare.com" target="_blank">Cloudflare Developer Docs</a><span>↗</span></div><div class="item"><a href="/mindmapmaker">Kebijakan & Panduan Internal</a><span>›</span></div></div></div></section>
</main>
<section id="auth-modal" class="auth"><form id="auth-form" class="modal"><div class="switch"><button id="tab-login" type="button" class="active">Login</button><button id="tab-register" type="button">Register</button></div><label>Nama</label><input id="name" class="input" type="text" required/><label>Buat Sandi</label><input id="password" class="input" type="password" minlength="8" required/><div class="row" style="margin-top:.7rem"><button id="submit-auth" class="btn" type="submit">Login</button><button type="button" id="close-modal" class="btn ghost">Close</button></div><div id="auth-status" class="small"></div></form></section>
<section id="profile-sheet" class="profile-sheet"><div class="profile-panel"><h3>Profil</h3><div id="profile-username" class="small"></div><div class="small">Jumlah Mindmap: <span id="map-count">0</span></div><div id="profile-map-list" class="list" style="margin-top:.7rem"></div></div></section>
<nav class="bottom"><button class="nav-btn active" data-page="home">⌂<span>Home</span></button><button class="nav-btn" data-page="mindmaps">◉<span>Mindmaps</span></button><button class="nav-btn" data-page="peoples">◌<span>Peoples</span></button><button class="nav-btn" data-page="information">ⓘ<span>Information</span></button></nav>
<script type="module">import { summarizeMindmap, rankMindmaps } from '/mindmapmaker/summary-engine.js';
const $=(i)=>document.getElementById(i),state={cfg:null,mode:'login'};const createdKey='mindmapmaker:created_maps';
const pages=['home','mindmaps','peoples','information'];
function setPage(p){for(const id of pages){$(`page-${id}`).classList.toggle('active',id===p);}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===p));if(p==='mindmaps')renderMindmaps();if(p==='peoples')loadPeoples();}
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.page)));
const parseMaps=()=>JSON.parse(localStorage.getItem(createdKey)||'[]'); const saveMap=(id)=>{const s=new Set(parseMaps());s.add(Number(id));localStorage.setItem(createdKey,JSON.stringify([...s]));};
const goto=(v)=>{const id=Number(v);const safe=Number.isInteger(id)&&id>0?id:1;localStorage.setItem('mindmapmaker:lastMapId',String(safe));location.href=`/mindmapmaker/editor/${safe}`};
async function getConfig(){ if(state.cfg) return state.cfg; const fallback={supabaseUrl:localStorage.getItem('mindmapmaker:supabase_url')||'',supabaseAnonKey:localStorage.getItem('mindmapmaker:supabase_anon')||''}; try{const r=await fetch('/api/mindmapmaker/auth-config',{cache:'no-store'});const d=await r.json(); if(r.ok&&d.ok){state.cfg=d; localStorage.setItem('mindmapmaker:supabase_url',d.supabaseUrl); localStorage.setItem('mindmapmaker:supabase_anon',d.supabaseAnonKey); return d;}}catch{} if(fallback.supabaseUrl&&fallback.supabaseAnonKey){state.cfg=fallback; return fallback;} throw new Error('Auth config tidak ditemukan. Set SUPABASE_URL dan SUPABASE_ANON_KEY di Cloudflare.'); }
async function authRequest(path,body){const {supabaseUrl,supabaseAnonKey}=await getConfig();const r=await fetch(`${supabaseUrl}/auth/v1/${path}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':supabaseAnonKey},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.msg||d.error_description||d.error||'Auth gagal');return d;}
function applyMode(){const l=state.mode==='login';$('tab-login').classList.toggle('active',l);$('tab-register').classList.toggle('active',!l);$('submit-auth').textContent=l?'Login':'Konfirmasi';}
function renderMindmaps(){const ids=rankMindmaps(parseMaps().map((id)=>({id,updatedAt:id})));$('mindmap-list').innerHTML=ids.map(({id})=>`<div class="item"><a href="/mindmapmaker/editor/${id}">Mindmap #${id}</a><span class="small">${summarizeMindmap({nodes:[{label:'Node Utama'},{label:'Cabang'}]})}</span></div>`).join('')||'<div class="item">Belum ada mindmap.</div>'; $('profile-map-list').innerHTML=ids.map(({id})=>`<a class="item" href="/mindmapmaker/editor/${id}">Mindmap #${id}<span>›</span></a>`).join('')||'<div class="item">Belum ada mindmap.</div>'; $('map-count').textContent=String(ids.length);}
async function loadPeoples(){const host=$('peoples-list');host.innerHTML='<div class="item">Memuat pengguna...</div>';try{const {supabaseUrl,supabaseAnonKey}=await getConfig();const r=await fetch(`${supabaseUrl}/rest/v1/user_profiles?select=id,display_name&limit=50`,{headers:{apikey:supabaseAnonKey}});const rows=await r.json();host.innerHTML=(Array.isArray(rows)&&rows.length?rows:[]).map((u)=>`<div class="item"><strong>${u.display_name||u.id}</strong><span><button class="btn ghost" data-user="${u.id}">Friend Request</button> <button class="btn" data-user="${u.id}">Grant Access</button></span></div>`).join('')||'<div class="item">Tidak ada data user_profiles. Buat tabel publik sesuai README.</div>';}catch(e){host.innerHTML=`<div class="item">Gagal memuat users: ${e.message}</div>`;}}
function syncUI(){const email=localStorage.getItem('mindmapmaker:user_email'),token=localStorage.getItem('mindmapmaker:access_token'),ok=Boolean(email&&token);$('session-text').textContent=ok?`Login sebagai ${email}`:'Belum login.';$('logout').style.display=ok?'inline-block':'none';$('auth-action').style.display=ok?'none':'inline-block';$('profile-btn').style.display=ok?'inline-flex':'none';$('profile-btn').textContent=(email||'U')[0].toUpperCase();$('profile-username').textContent=`Username: ${email||'-'}`;renderMindmaps();}
$('auth-action').onclick=()=>$('auth-modal').classList.add('open');$('profile-btn').onclick=()=>{$('profile-sheet').classList.add('open');renderMindmaps();};$('profile-sheet').onclick=(e)=>{if(e.target.id==='profile-sheet')e.currentTarget.classList.remove('open')};$('close-modal').onclick=()=>$('auth-modal').classList.remove('open');
$('tab-login').onclick=()=>{state.mode='login';applyMode()};$('tab-register').onclick=()=>{state.mode='register';applyMode()};
$('auth-form').onsubmit=async(e)=>{e.preventDefault();const email=$('name').value.trim(),password=$('password').value;try{if(state.mode==='login'){const res=await authRequest('token?grant_type=password',{email,password});localStorage.setItem('mindmapmaker:access_token',res.access_token||'');localStorage.setItem('mindmapmaker:user_email',res.user?.email||email);$('auth-modal').classList.remove('open');$('auth-status').textContent='';syncUI();return;}await authRequest('signup',{email,password});state.mode='login';applyMode();$('auth-status').textContent='Register sukses. Silakan login.';}catch(err){$('auth-status').textContent=err.message;}};
$('logout').onclick=()=>{localStorage.removeItem('mindmapmaker:access_token');localStorage.removeItem('mindmapmaker:user_email');syncUI();};
$('continue-map').onclick=()=>goto($('map-id').value);$('create-map').onclick=()=>{const id=Math.floor(Date.now()/1000);saveMap(id);$('launch-status').textContent=`Map baru dibuat: ${id}`;goto(id)};$('open-last').onclick=()=>goto(Number(localStorage.getItem('mindmapmaker:lastMapId')||1));
applyMode();syncUI();
</script></body></html>
