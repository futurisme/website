<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mindmapmaker Dashboard | fadhil.dev</title>
<style>
:root{--w:#fff;--ink:#050b1f;--n:#0b1f5c;--line:#d9e3ff;--mut:#445071}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#fff,#f3f7ff);color:var(--ink)}
body{font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;padding-bottom:48px}.top{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--line);background:var(--w);position:sticky;top:0;z-index:20}
.brand{font-weight:800;font-size:clamp(.92rem,2vw,1.05rem)}.auth-btn{border:1px solid var(--n);background:var(--n);color:#fff;border-radius:8px;padding:.42rem .7rem;font-size:.8rem;font-weight:700}
.profile{display:none;width:34px;height:34px;border-radius:999px;border:1px solid var(--n);background:#fff;color:var(--n);font-size:.78rem;font-weight:800;align-items:center;justify-content:center}
.shell{max-width:1100px;margin:0 auto;padding:1rem}.grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem}.card{border:1px solid var(--line);border-radius:14px;padding:.95rem 1rem;background:#fff}
.input{width:100%;border:1px solid #bfd1ff;border-radius:10px;padding:.68rem .78rem}.btn{border:1px solid var(--n);background:var(--n);color:#fff;border-radius:9px;padding:.55rem .82rem;font-size:.85rem;font-weight:700}
.btn.ghost{background:#fff;color:var(--n)}.row{display:flex;gap:.55rem;flex-wrap:wrap}.status{color:var(--n);font-size:.86rem;min-height:1.2rem;margin-top:.4rem}
.auth,.profile-sheet{display:none;position:fixed;inset:0;background:rgba(2,6,23,.58);z-index:30}.auth.open,.profile-sheet.open{display:block}
.modal{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:min(420px,100% - 2rem);background:#fff;border:1px solid var(--line);border-radius:14px;padding:1rem}
.switch{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:.8rem}.switch button{padding:.5rem;border:0;background:#fff;color:var(--n);font-weight:700}.switch button.active{background:var(--n);color:#fff}
.profile-panel{position:absolute;left:0;right:0;top:52px;bottom:48px;margin:0 auto;width:min(1100px,100%);background:#fff;border-top:1px solid var(--line);padding:1rem;overflow:auto}
.profile-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem}.dots{background:#fff;border:1px solid var(--line);border-radius:8px;padding:.35rem .5rem;font-weight:700}
.map-list{margin-top:.7rem;display:grid;gap:.55rem}.map-item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:10px;padding:.6rem .7rem;background:#f9fbff;color:var(--ink);text-decoration:none}
.bottom{position:fixed;left:0;right:0;bottom:0;height:42px;border-top:1px solid var(--line);background:#fff;display:grid;grid-template-columns:repeat(4,1fr);z-index:25}.nav-btn{border:0;background:transparent;color:var(--n);font-size:.75rem;display:grid;place-items:center;line-height:1.1}
@media(max-width:860px){.grid{grid-template-columns:1fr}.shell{padding:.8rem}.profile-panel{top:50px;bottom:42px}}
</style></head><body>
<header class="top"><div class="brand">MINDMAPMAKER DASHBOARD</div><div><button id="auth-action" class="auth-btn">Login/Register</button><button id="profile-btn" class="profile" title="Profile"></button></div></header>
<main class="shell"><section class="grid"><article class="card"><h2>Workspace Launcher</h2><label>Map ID</label><div class="row"><input id="map-id" class="input" type="number" min="1" step="1" value="1" /><button id="continue-map" class="btn">Continue</button></div><div class="row" style="margin-top:.6rem"><button id="create-map" class="btn ghost">Create New</button><button id="open-last" class="btn ghost">Open Last</button></div><div id="launch-status" class="status"></div></article><aside class="card"><h3>Session</h3><p id="session-text">Belum login.</p><button id="logout" class="btn ghost" style="display:none">Logout</button></aside></section></main>
<section id="auth-modal" class="auth"><form id="auth-form" class="modal"><div class="switch"><button id="tab-login" type="button" class="active">Login</button><button id="tab-register" type="button">Register</button></div><label>Nama</label><input id="name" class="input" type="text" required /><label>Buat Sandi</label><input id="password" class="input" type="password" minlength="8" required /><div class="row" style="margin-top:.7rem"><button class="btn" id="submit-auth" type="submit">Login</button><button class="btn ghost" type="button" id="close-modal">Close</button></div><div id="auth-status" class="status"></div></form></section>
<section id="profile-sheet" class="profile-sheet"><div class="profile-panel"><div class="profile-head"><div><h3 style="margin:.1rem 0">Profil</h3><div id="profile-username" style="color:var(--mut)">-</div></div><button class="dots" aria-label="More">⋯</button></div><div style="margin-top:.7rem;font-weight:700">Jumlah Mindmap: <span id="map-count">0</span></div><div id="map-list" class="map-list"></div></div></section>
<nav class="bottom" aria-label="Bottom navigation"><button class="nav-btn">⌂<span>Home</span></button><button class="nav-btn">◉<span>Mindmaps</span></button><button class="nav-btn">◌<span>Peoples</span></button><button class="nav-btn">ⓘ<span>Information</span></button></nav>
<script type="module">
const $=(i)=>document.getElementById(i),state={cfg:null,mode:'login'};const mapsKey='mindmapmaker:created_maps';
const parseMaps=()=>JSON.parse(localStorage.getItem(mapsKey)||'[]'); const saveMap=(id)=>{const s=new Set(parseMaps()); s.add(Number(id)); localStorage.setItem(mapsKey,JSON.stringify([...s].filter(Boolean)));};
const goto=(v)=>{const id=Number(v);const safe=Number.isInteger(id)&&id>0?id:1;localStorage.setItem('mindmapmaker:lastMapId',String(safe));location.href=`/mindmapmaker/editor/${safe}`};
async function getConfig(){if(state.cfg)return state.cfg;const r=await fetch('/api/mindmapmaker/auth-config',{cache:'no-store'});const d=await r.json();if(!r.ok||!d.ok)throw new Error('Konfigurasi auth belum aktif.');state.cfg=d;return d;}
async function authRequest(path,body){const {supabaseUrl,supabaseAnonKey}=await getConfig();const r=await fetch(`${supabaseUrl}/auth/v1/${path}`,{method:'POST',headers:{'Content-Type':'application/json','apikey':supabaseAnonKey},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.msg||d.error_description||d.error||'Auth gagal.');return d;}
function renderProfile(){const email=localStorage.getItem('mindmapmaker:user_email')||'-';$('profile-username').textContent=`Username: ${email}`;const maps=parseMaps().sort((a,b)=>b-a);$('map-count').textContent=String(maps.length);$('map-list').innerHTML=maps.map((id)=>`<a class="map-item" href="/mindmapmaker/editor/${id}"><span>Mindmap #${id}</span><span>›</span></a>`).join('')||'<div class="map-item"><span>Belum ada mindmap.</span></div>';}
function applyMode(){const l=state.mode==='login';$('tab-login').classList.toggle('active',l);$('tab-register').classList.toggle('active',!l);$('submit-auth').textContent=l?'Login':'Konfirmasi';}
function syncUI(){const email=localStorage.getItem('mindmapmaker:user_email');const token=localStorage.getItem('mindmapmaker:access_token');const ok=Boolean(email&&token);$('session-text').textContent=ok?`Login sebagai ${email}`:'Belum login.';$('logout').style.display=ok?'inline-block':'none';$('auth-action').style.display=ok?'none':'inline-block';$('profile-btn').style.display=ok?'inline-flex':'none';$('profile-btn').textContent=(email||'U').slice(0,1).toUpperCase();if(ok)renderProfile();}
$('auth-action').addEventListener('click',()=>$('auth-modal').classList.add('open')); $('profile-btn').addEventListener('click',()=>{$('profile-sheet').classList.add('open');renderProfile();});
$('profile-sheet').addEventListener('click',(e)=>{if(e.target.id==='profile-sheet')e.currentTarget.classList.remove('open');});$('close-modal').addEventListener('click',()=>$('auth-modal').classList.remove('open'));
$('tab-login').addEventListener('click',()=>{state.mode='login';applyMode()}); $('tab-register').addEventListener('click',()=>{state.mode='register';applyMode()});
$('auth-form').addEventListener('submit',async(e)=>{e.preventDefault();const name=$('name').value.trim();const password=$('password').value;try{if(state.mode==='login'){const res=await authRequest('token?grant_type=password',{email:name,password});localStorage.setItem('mindmapmaker:access_token',res.access_token||'');localStorage.setItem('mindmapmaker:user_email',res.user?.email||name);$('auth-modal').classList.remove('open');syncUI();return;}await authRequest('signup',{email:name,password});state.mode='login';applyMode();$('auth-status').textContent='Register sukses. Silakan login.';}catch(err){$('auth-status').textContent=err.message;}});
$('logout').addEventListener('click',()=>{localStorage.removeItem('mindmapmaker:access_token');localStorage.removeItem('mindmapmaker:user_email');$('profile-sheet').classList.remove('open');syncUI();});
$('continue-map').addEventListener('click',()=>goto($('map-id').value));$('create-map').addEventListener('click',()=>{const id=Math.floor(Date.now()/1000);saveMap(id);$('launch-status').textContent=`Map baru dibuat: ${id}`;goto(id)});$('open-last').addEventListener('click',()=>goto(Number(localStorage.getItem('mindmapmaker:lastMapId')||1)));
applyMode();syncUI();
</script></body></html>
