<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mindmapmaker Editor</title>
    <link rel="canonical" href="https://fadhil.dev/mindmapmaker/edit/1" />
    <meta name="robots" content="index,follow" />
    <link rel="stylesheet" href="/mindmapmaker/editor/editor.css?v=20260514c" />
  </head>
  <body>
    <main class="editor-shell">
      <section class="workspace panel">
        <div class="help" id="status">Drag area untuk pan · Tap node untuk pilih · Drag node untuk pindah.</div>
        <div id="viewport" class="viewport" aria-label="Mindmap canvas">
          <span class="status-dot status-dot-floating" id="sync-status-dot" data-online="false"></span>
          <canvas id="grid-canvas" class="grid-canvas" aria-hidden="true"></canvas>
          <svg id="edges" class="edges" aria-hidden="true"></svg>
          <div id="nodes" class="nodes"></div>
        </div>
      </section>
      <footer class="bottombar panel">
        <div class="actions">
          <button id="add-node" class="btn" type="button">＋</button>
          <button id="rename-node" class="btn" type="button">✎</button>
          <button id="connect-node" class="btn" type="button">🔗</button>
          <button id="remove-node" class="btn danger" type="button">🗑</button>
          <button id="undo-node" class="btn" type="button" disabled>↶</button>
          <button id="redo-node" class="btn" type="button" disabled>↷</button>
          <button id="save-csv" class="btn" type="button">⤓</button>
          <button id="save-fdhl" class="btn" type="button">⎘</button>
          <button id="load-map" class="btn" type="button">⤒</button>
          <a class="btn" href="/mindmapmaker">⌂</a>
          <input id="load-input" type="file" accept=".csv,.fdhl,.fadhil,.fAdHiL,.cws" hidden />
        </div>
      </footer>
    <div id="toast" class="toast" hidden></div></main>
    <div id="rename-modal" class="modal" hidden>
      <div class="modal-box">
        <h3>Rename Node</h3>
        <textarea id="rename-input" class="modal-input" rows="5" spellcheck="false"></textarea>
        <div class="modal-actions">
          <button id="rename-cancel" class="btn" type="button">✖</button>
          <button id="rename-confirm" class="btn" type="button">✔</button>
        </div>
      </div>
    </div>
    <script type="module" src="/mindmapmaker/editor/editor.js?v=20260514c"></script>
  </body>
</html>
