<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShareIdeas — Home</title>
    <link rel="canonical" href="https://fadhil.dev/shareideas" />
    <meta name="description" content="ShareIdeas home untuk membuat workspace ide dan kolaborasi konsep secara cepat." />
    <link rel="stylesheet" href="/shareideas/shareideas.css" />
    <style>
      .landing {
        min-height: 100dvh;
        display: grid;
        align-content: start;
        justify-items: center;
        padding: 0 12px 16px;
      }
      .top-header {
        width: 100%;
        min-height: 24px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: max(2px, env(safe-area-inset-top)) 4px 0;
        font-size: 11px;
        line-height: 1;
        color: #e6c8b7;
        letter-spacing: 0.04em;
        background: #693b16;
        border-radius: 0 0 10px 10px;
        margin-bottom: 8px;
      }
      .landing-card {
        width: min(960px, 100%);
        border: 1px solid #5c291f55;
        border-radius: 20px;
        padding: 10px 10px 14px;
        background: linear-gradient(140deg, #5D1C34 0%, #6e3d23 100%);
        color: #fff;
        box-shadow: 0 10px 30px #572a2559;
        display: grid;
        gap: 12px;
        text-align: center;
      }
      .landing-intro {
        display: grid;
        gap: 10px;
        padding: 0 8px;
      }
      .hero-banner {
        width: calc(100% + 10px);
        margin-left: -5px;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 14px;
        display: block;
        border: 1px solid #ffffff30;
      }
      .landing-card h1 { margin: 0; font-size: clamp(30px, 8vw, 56px); letter-spacing: 0.04em; }
      .landing-card p { margin: 0; font-size: 14px; opacity: 0.95; }
      .landing-actions { display: flex; justify-content: center; }
      .pages-wrap {
        margin-top: 2px;
        border: 1px solid #ffffff2e;
        border-radius: 14px;
        background: #00000024;
        padding: 8px;
        text-align: left;
      }
      .pages-title {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .pages-list {
        display: grid;
        gap: 8px;
        max-height: min(52dvh, 460px);
        overflow: auto;
      }
      .page-card {
        width: 100%;
        border: 1px solid #ffffff33;
        border-radius: 10px;
        background: #ffffff1a;
        color: #fff;
        padding: 10px 12px;
        display: grid;
        gap: 4px;
        text-align: left;
      }
      .page-card-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }
      .page-id {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.95;
      }
      .page-date {
        font-size: 11px;
        opacity: 0.82;
      }
      .page-title {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .create-btn {
        appearance: none;
        border: 1px solid #ffffff57;
        border-radius: 999px;
        padding: 10px 22px;
        background: #ffffff1f;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
      }
    </style>
    <link rel="icon" href="/fadhil-512x512.png" sizes="512x512" type="image/png" />
    <link rel="alternate icon" href="/fadhil.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="landing">
      <div class="top-header">1.0.0</div>
      <section class="landing-card">
        <img class="hero-banner" src="/assets/public/images/shareideas-2.webp" alt="ShareIdeas banner" loading="eager" decoding="async" />
        <div class="landing-intro">
          <p>By Fadhil Akbar</p>
          <h1>ShareIdeas</h1>
          <p>ShareIdeas is a digital workspace for creating and organizing various ideas using various categories, folders, and cards in one website page at no cost.</p>
          <div class="landing-actions">
            <button class="create-btn" id="create-new" type="button">Create new</button>
          </div>
        </div>
        <div class="pages-wrap">
          <p class="pages-title">Page List</p>
          <div class="pages-list" id="pages-list"></div>
        </div>
      </section>
    </main>

    <script type="module">
      import { createWorkspace, fetchWorkspaceList, goToWorkspace } from '/library/fadhilweblib/fadhilwebideaslib/runtime.js';

      const createBtn = document.getElementById('create-new');
      const pagesListEl = document.getElementById('pages-list');

      const formatDateTime = (value) => {
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return '-';
        return new Intl.DateTimeFormat('id-ID', {
          dateStyle: 'medium',
          timeStyle: 'short',
        }).format(parsed);
      };

      const renderPages = async () => {
        try {
          const pages = await fetchWorkspaceList();
          if (!pages.length) {
            pagesListEl.innerHTML = '<p class="page-date">Belum ada page. Buat page baru dengan Create new.</p>';
            return;
          }

          pagesListEl.innerHTML = '';
          pages.forEach((page) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'page-card';
            button.innerHTML = `
              <span class="page-card-top">
                <span class="page-id">#${String(page.id || '-')}</span>
                <span class="page-date">${formatDateTime(page.updatedAt)}</span>
              </span>
              <span class="page-title">${String(page.title || `Page ${page.id || '-'}`)}</span>
            `;
            button.addEventListener('click', () => goToWorkspace(page.id));
            pagesListEl.append(button);
          });
        } catch (error) {
          pagesListEl.innerHTML = `<p class="page-date">${error instanceof Error ? error.message : 'Gagal memuat daftar page.'}</p>`;
        }
      };

      createBtn?.addEventListener('click', async () => {
        if (createBtn.disabled) return;
        createBtn.disabled = true;
        try {
          const id = await createWorkspace();
          goToWorkspace(id);
        } catch (error) {
          createBtn.disabled = false;
          window.alert(error instanceof Error ? error.message : 'Gagal membuat workspace baru.');
        }
      });

      void renderPages();
    </script>
  </body>
</html>
