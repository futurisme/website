<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Map Maker</title>
    <link rel="stylesheet" href="/mindmapmaker/app.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Mind Map Maker</h1>
      <div class="toolbar">
        <input id="nodeLabel" type="text" placeholder="Node label" />
        <button id="addRoot">Add Root</button>
        <button id="addChild">Add Child</button>
        <button id="connect">Connect</button>
        <button id="delete">Delete</button>
        <button id="reset">Reset</button>
      </div>
    </header>

    <main>
      <aside class="panel">
        <h2>How to use</h2>
        <ol>
          <li>Add a root node.</li>
          <li>Select a node then add child nodes.</li>
          <li>Choose two nodes and click connect.</li>
          <li>Drag nodes to arrange your map.</li>
        </ol>
        <p id="selection">Selected: none</p>
      </aside>
      <section class="canvas-wrap">
        <svg id="links" class="links" aria-hidden="true"></svg>
        <div id="canvas" class="canvas" role="application" aria-label="Mind map canvas"></div>
      </section>
    </main>

    <script src="/mindmapmaker/app.js" defer></script>
  </body>
</html>
