<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fadhil Web RPG Fullframe 2026</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: #0b1220;
        --panel-soft: #111b30;
        --border: #334155;
        --text: #dbeafe;
        --muted: #93a5be;
      }
      * { box-sizing: border-box; min-width: 0; }
      html, body { margin: 0; width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
      .shell { width: 100vw; min-height: 100dvh; }
      .frame { display: none; width: 100%; padding: 10px; }
      .frame-active { display: block; animation: fadeIn .18s ease-out; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
      .header h1 { margin: 0; font-size: clamp(1.2rem, 4vw, 1.8rem); }
      .header p { margin: 6px 0 0; color: var(--muted); }
      .actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
      button {
        border: 1px solid #3f4c66;
        border-radius: 10px;
        background: #162136;
        color: #e8f1ff;
        min-height: 38px;
        padding: 7px 12px;
        font-weight: 650;
      }
      button:hover { cursor: pointer; background: #1e2b46; }
      button.primary { background: linear-gradient(90deg,#4f46e5,#2563eb); border-color: transparent; }
      .stats { margin-top: 10px; display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(0,1fr)); }
      .stat { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
      .stat label { font-size: .75rem; color: var(--muted); display:block; }
      .stat strong { font-size: .95rem; }
      .grid { margin-top: 10px; display: grid; gap: 8px; grid-template-columns: repeat(2, minmax(0,1fr)); }
      .line { border: 1px solid var(--border); border-radius: 8px; padding: 8px; background: #0a1326; font-size: .83rem; margin-bottom: 6px; }
      .frame-back { position: sticky; top: 8px; float: right; border-radius: 999px; width: 34px; height: 34px; padding: 0; }
      .section-title { margin: 0 0 8px; font-size: 1rem; }
      .hero-tabs, .action-grid, .travel-grid { display: flex; gap: 6px; flex-wrap: wrap; }
      .hero-tabs button.active, .action-grid button.active { border-color: #60a5fa; background: #1d3356; }
      .action-grid button[disabled], .travel-grid button[disabled] { opacity: .45; cursor: not-allowed; }
      .battle-log { margin-top: 8px; background: #070c18; border: 1px solid var(--border); border-radius: 10px; min-height: 180px; max-height: 280px; overflow: auto; padding: 8px; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: .8rem; }
      .map-wrap { margin-top: 8px; border: 1px solid var(--border); border-radius: 12px; background: #081425; overflow: hidden; height: min(62dvh, 520px); position: relative; touch-action: none; }
      .map-plane { position: absolute; width: 1280px; height: 900px; background: radial-gradient(circle at 35% 35%, #115e59, #0f172a 62%); transform-origin: 0 0; }
      .map-link { position: absolute; height: 2px; background: rgba(148,163,184,.4); transform-origin: 0 0; pointer-events: none; }
      .node { position:absolute; transform: translate(-50%, -50%); border-radius: 999px; border:1px solid #0f172a; padding: 5px 8px; font-size: 12px; }
      .node.city { background:#2563eb; }
      .node.village { background:#059669; }
      .node.dungeon { background:#7c3aed; }
      .node.current { outline: 2px solid #fbbf24; }
      .node.locked { opacity: .45; }
      .party-grid { display:grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); }
      .unit-card { text-align:left; }
      .unit-card small { color: var(--muted); display:block; }
      .detail { display:grid; gap:8px; }
      .meter { height:8px; background:#0f172a; border-radius:999px; overflow:hidden; }
      .meter > span { display:block; height:100%; }
      .hp { background:linear-gradient(90deg,#16a34a,#86efac); }
      .mp { background:linear-gradient(90deg,#2563eb,#93c5fd); }
      .tp { background:linear-gradient(90deg,#d97706,#fde68a); }
      .break { background:linear-gradient(90deg,#9333ea,#f0abfc); }
      .tiny { color: var(--muted); font-size: .78rem; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      @media (max-width: 820px) {
        .stats { grid-template-columns: 1fr 1fr; }
        .grid { grid-template-columns: 1fr; }
        button { min-height: 36px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section id="frameMain" class="frame frame-active">
        <article class="card header">
          <h1>FadhilWebRPGLib JRPG Fullframe</h1>
          <p>Tanpa command input. Semua interaksi via tombol, fullframe, dan subfullframe ala DreamBusiness.</p>
          <div class="actions">
            <button class="primary" id="mainRoundBtn">Mainkan Round</button>
            <button id="mainAutoBtn">Auto x3</button>
            <button id="toBattleBtn">Battle Fullframe</button>
            <button id="toMapBtn">Map Fullframe</button>
            <button id="toPartyBtn">Party Fullframe</button>
            <button id="mainResetBtn">Reset</button>
          </div>
        </article>
        <section class="stats" id="mainStats"></section>
        <section class="grid">
          <article class="card">
            <h2 class="section-title">Ringkasan Party</h2>
            <div id="partySummary"></div>
          </article>
          <article class="card">
            <h2 class="section-title">Ringkasan Enemy</h2>
            <div id="enemySummary"></div>
          </article>
        </section>
      </section>

      <section id="frameBattle" class="frame">
        <button class="frame-back" id="backBattle">↩</button>
        <article class="card">
          <h2 class="section-title">Battle Fullframe</h2>
          <div class="hero-tabs" id="heroTabs"></div>
          <div class="action-grid" id="actionGrid"></div>
          <div class="actions" style="margin-top:8px;">
            <button id="battleRoundBtn">Round</button>
            <button id="battleAutoBtn">Auto x3</button>
            <button id="battleResetBtn">Reset</button>
          </div>
          <div class="battle-log" id="battleLog"></div>
        </article>
      </section>

      <section id="frameMap" class="frame">
        <button class="frame-back" id="backMap">↩</button>
        <article class="card">
          <h2 class="section-title">Map Fullframe</h2>
          <p class="tiny">Geser peta dengan drag. Tap node tetangga untuk travel.</p>
          <div class="travel-grid" id="travelButtons"></div>
          <div class="map-wrap" id="mapWrap"><div class="map-plane" id="mapPlane"></div></div>
        </article>
      </section>

      <section id="frameParty" class="frame">
        <button class="frame-back" id="backParty">↩</button>
        <article class="card">
          <h2 class="section-title">Party Fullframe</h2>
          <div class="party-grid" id="partyGrid"></div>
        </article>
      </section>

      <section id="frameSub" class="frame">
        <button class="frame-back" id="backSub">↩</button>
        <article class="card detail" id="unitDetail"></article>
      </section>
    </main>

    <script src="./fadhilwebrpglib.js"></script>
    <script>
      var lib = window.fadhilwebrpglib;
      var rand = lib.seededRandom(2026);
      var selectedHeroId = 'hero-akari';
      var selectedAction = 'basic';
      var logs = ['UI Fullframe siap.'];
      var drag = { active:false, x:0, y:0, moved:false };
      var currentUnitId = '';

      var partyTemplate = [
        { id:'hero-akari', name:'Akari Ronin', role:'striker', level:12, maxHp:290, hp:290, maxMp:88, mp:88, tp:20, attack:52, defense:30, agility:35, spirit:24, element:'wind', alive:true,
          skills:[
            { id:'sakura-edge', name:'Sakura Edge', costMp:9, costTp:10, power:30, element:'wind', variance:0.14, addStatus:'slow', breakDamage:26, tags:['breaker'] },
            { id:'zen-limit', name:'Zen Limit Blade', costMp:14, costTp:28, power:66, element:'light', variance:0.1, limitCost:60, breakDamage:30 }
          ] },
        { id:'hero-ren', name:'Ren Onmyoji', role:'oracle', level:12, maxHp:238, hp:238, maxMp:132, mp:132, tp:16, attack:40, defense:26, agility:29, spirit:44, element:'water', alive:true,
          skills:[
            { id:'aqua-noctis', name:'Aqua Noctis', costMp:12, costTp:6, power:40, element:'water', variance:0.12, addStatus:'poison', breakDamage:20 },
            { id:'tidal-prayer', name:'Tidal Prayer', costMp:16, costTp:0, power:0, element:'water', variance:0, target:'ally', healScale:3.1, addStatus:'regen' }
          ] },
        { id:'hero-mei', name:'Mei Gearsmith', role:'vanguard', level:12, maxHp:260, hp:260, maxMp:74, mp:74, tp:22, attack:47, defense:33, agility:31, spirit:30, element:'fire', alive:true,
          skills:[
            { id:'gear-burst', name:'Gear Burst', costMp:8, costTp:10, power:28, element:'fire', variance:0.18, addStatus:'stun', breakDamage:24, tags:['breaker'] },
            { id:'omega-cascade', name:'Omega Cascade', costMp:16, costTp:24, power:52, element:'fire', variance:0.16, limitCost:70, breakDamage:28 }
          ] }
      ];

      var enemyTemplate = [
        { id:'enemy-oni', name:'Oni Vanguard', role:'vanguard', level:12, maxHp:336, hp:336, maxMp:82, mp:82, tp:18, attack:48, defense:38, agility:20, spirit:24, element:'earth', alive:true,
          skills:[{ id:'basalt-crash', name:'Basalt Crash', costMp:8, costTp:8, power:34, element:'earth', variance:0.1, breakDamage:22 }] },
        { id:'enemy-yoru', name:'Yoru Specter', role:'striker', level:12, maxHp:224, hp:224, maxMp:126, mp:126, tp:20, attack:42, defense:24, agility:41, spirit:41, element:'shadow', alive:true,
          skills:[{ id:'abyss-lance', name:'Abyss Lance', costMp:12, costTp:10, power:45, element:'shadow', variance:0.15, addStatus:'poison', breakDamage:20 }] },
        { id:'enemy-cleric', name:'Void Cleric', role:'oracle', level:12, maxHp:270, hp:270, maxMp:140, mp:140, tp:14, attack:36, defense:30, agility:27, spirit:45, element:'light', alive:true,
          skills:[
            { id:'dusk-ray', name:'Dusk Ray', costMp:11, costTp:6, power:33, element:'light', variance:0.12, breakDamage:18 },
            { id:'night-rite', name:'Night Rite', costMp:15, costTp:0, power:0, element:'light', variance:0, target:'ally', healScale:2.6, addStatus:'regen' }
          ] }
      ];

      function createInitialState() {
        return lib.createState(partyTemplate, enemyTemplate, {
          inventory: [
            { id:'ether-mini', name:'Ether Mini', qty:3, healMp:26, target:'ally' },
            { id:'hi-potion', name:'Hi Potion', qty:4, healHp:110, target:'ally', cleanse:true },
            { id:'phoenix-nano', name:'Phoenix Nano', qty:2, revive:90, target:'ally' }
          ]
        });
      }

      var state = createInitialState();

      function $(id){ return document.getElementById(id); }
      function allFrames(){ return ['frameMain','frameBattle','frameMap','frameParty','frameSub']; }
      function openFrame(id){ allFrames().forEach(function(fid){ $(fid).classList.toggle('frame-active', fid === id); }); if (id === 'frameMap') renderMap(); }
      function appendLogs(lines){ if (!lines) return; logs = logs.concat(lines).slice(-220); }
      function ratio(v, max){ return Math.max(0, Math.min(100, Math.round((v / Math.max(max,1)) * 100))); }

      function unitSummaryLine(u){
        var status = (u.status || []).map(function(s){ return s.type + ':' + s.turns; }).join(', ') || '-';
        return '<div class="line"><strong>' + u.name + '</strong><br/>HP ' + u.hp + '/' + u.maxHp + ' · MP ' + u.mp + '/' + u.maxMp + ' · TP ' + u.tp + ' · Break ' + u.breakGauge + '<br/><span class="tiny">Status: ' + status + '</span></div>';
      }

      function renderMain(){
        var summary = lib.getBattleSummary(state);
        $('mainStats').innerHTML = [
          ['Mode', summary.mode], ['Lokasi', summary.location], ['Round', summary.cycle],
          ['Weather', summary.weather], ['Anomaly', summary.anomaly], ['Party Alive', summary.partyAlive],
          ['Enemy Alive', summary.enemyAlive], ['Travel', summary.travelCount], ['Damage', summary.metrics.totalDamage]
        ].map(function(p){ return '<article class="stat"><label>' + p[0] + '</label><strong>' + p[1] + '</strong></article>'; }).join('');

        $('partySummary').innerHTML = state.party.map(unitSummaryLine).join('');
        $('enemySummary').innerHTML = state.enemies.map(unitSummaryLine).join('');
      }

      function renderBattle(){
        var aliveParty = state.party.filter(function(u){ return u.alive; });
        if (!aliveParty.some(function(u){ return u.id === selectedHeroId; })) selectedHeroId = (aliveParty[0] || {}).id || '';

        $('heroTabs').innerHTML = aliveParty.map(function(u){
          return '<button data-hero="' + u.id + '" class="' + (u.id === selectedHeroId ? 'active' : '') + '">' + u.name + '</button>';
        }).join('');

        var catalog = selectedHeroId ? lib.listActionCatalog(state, selectedHeroId) : [];
        $('actionGrid').innerHTML = catalog.map(function(action){
          var active = action.id === selectedAction ? 'active' : '';
          var dis = action.enabled === false ? 'disabled' : '';
          return '<button data-action="' + action.id + '" class="' + active + '" ' + dis + '>' + action.label + '</button>';
        }).join('');

        $('battleLog').textContent = logs.join('\n');
        $('battleLog').scrollTop = $('battleLog').scrollHeight;
      }

      function renderParty(){
        $('partyGrid').innerHTML = state.party.map(function(u){
          return '<button class="unit-card" data-unit="' + u.id + '"><strong>' + u.name + '</strong><small>Lv ' + u.level + ' · ' + u.role + '</small><small>HP ' + u.hp + '/' + u.maxHp + '</small></button>';
        }).join('');
      }

      function renderUnitSub(){
        var unit = state.party.concat(state.enemies).find(function(u){ return u.id === currentUnitId; });
        if (!unit) return;
        var status = (unit.status || []).map(function(s){ return s.type + ':' + s.turns; }).join(', ') || '-';
        $('unitDetail').innerHTML = '<h2 class="section-title">' + unit.name + '</h2>'
          + '<div class="tiny">Role: ' + unit.role + ' · Element: ' + unit.element + ' · Level: ' + unit.level + '</div>'
          + '<div><div class="tiny">HP</div><div class="meter"><span class="hp" style="width:' + ratio(unit.hp, unit.maxHp) + '%"></span></div></div>'
          + '<div><div class="tiny">MP</div><div class="meter"><span class="mp" style="width:' + ratio(unit.mp, unit.maxMp) + '%"></span></div></div>'
          + '<div><div class="tiny">TP</div><div class="meter"><span class="tp" style="width:' + ratio(unit.tp, 100) + '%"></span></div></div>'
          + '<div><div class="tiny">Break</div><div class="meter"><span class="break" style="width:' + ratio(unit.breakGauge, unit.maxBreakGauge) + '%"></span></div></div>'
          + '<div class="line">Status: ' + status + '<br/>ATK ' + unit.attack + ' · DEF ' + unit.defense + ' · AGI ' + unit.agility + ' · SPR ' + unit.spirit + '</div>'
          + '<div class="line">Skills:<br/>' + unit.skills.map(function(s){ return '- ' + s.name + ' (MP ' + s.costMp + ', TP ' + s.costTp + ')'; }).join('<br/>') + '</div>';
      }

      function renderMap(){
        var view = lib.getMapView(state);
        var plane = $('mapPlane');
        var locById = {};
        view.locations.forEach(function(l){ locById[l.id] = l; });

        var links = [];
        view.locations.forEach(function(loc){
          var full = state.world.map.locations.find(function(e){ return e.id === loc.id; });
          (full.neighbors || []).forEach(function(nb){
            if (loc.id > nb) return;
            if (!locById[nb]) return;
            var to = locById[nb];
            var dx = to.x - loc.x;
            var dy = to.y - loc.y;
            var len = Math.sqrt(dx*dx + dy*dy);
            var ang = Math.atan2(dy, dx) * 180 / Math.PI;
            links.push('<div class="map-link" style="left:' + loc.x + 'px;top:' + loc.y + 'px;width:' + len + 'px;transform:rotate(' + ang + 'deg);"></div>');
          });
        });

        var nodes = view.locations.map(function(loc){
          return '<button class="node ' + loc.type + (loc.isCurrent ? ' current' : '') + (loc.reachable ? '' : ' locked') + '" data-loc="' + loc.id + '" style="left:' + loc.x + 'px;top:' + loc.y + 'px;" ' + (loc.reachable || loc.isCurrent ? '' : 'disabled') + '>' + loc.name + '</button>';
        });

        plane.innerHTML = links.join('') + nodes.join('');
        plane.style.transform = 'translate3d(' + state.world.map.camera.x + 'px,' + state.world.map.camera.y + 'px,0)';

        $('travelButtons').innerHTML = view.locations.filter(function(l){ return l.reachable && !l.isCurrent; }).map(function(l){
          return '<button data-travel="' + l.id + '">' + l.name + '</button>';
        }).join('') || '<span class="tiny">Tidak ada node tetangga yang bisa dituju.</span>';
      }

      function stepRound(){
        state = lib.runRound(state, rand);
        appendLogs(state.logs);
        renderAll();
      }

      function auto3(){
        state = lib.simulate(state, rand, 3);
        appendLogs(state.logs);
        renderAll();
      }

      function runSelectedAction(){
        if (!selectedHeroId || !selectedAction) return;
        var action = lib.buildManualAction(state, selectedHeroId, selectedAction);
        if (!action) { appendLogs(['Aksi tidak valid untuk hero ini.']); renderAll(); return; }

        state = lib.execute(state, action, rand);
        appendLogs(['[Manual] ' + selectedHeroId + ' => ' + selectedAction].concat(state.logs));

        var enemyActor = lib.createTimeline(state, rand).find(function(id){ return state.enemies.some(function(e){ return e.id === id && e.alive; }); });
        if (enemyActor && !lib.battleFinished(state)) {
          state = lib.execute(state, lib.autoAction(state, enemyActor), rand);
          appendLogs(state.logs);
        }
        renderAll();
      }

      function resetGame(){
        state = createInitialState();
        logs = ['Game direset.'];
        selectedHeroId = 'hero-akari';
        selectedAction = 'basic';
        renderAll();
      }

      function travelToLocation(id){
        state = lib.travelTo(state, id);
        appendLogs(state.logs);
        renderAll();
      }

      function renderAll(){ renderMain(); renderBattle(); renderParty(); if ($('frameSub').classList.contains('frame-active')) renderUnitSub(); if ($('frameMap').classList.contains('frame-active')) renderMap(); }

      $('mainRoundBtn').addEventListener('click', stepRound);
      $('mainAutoBtn').addEventListener('click', auto3);
      $('mainResetBtn').addEventListener('click', resetGame);
      $('toBattleBtn').addEventListener('click', function(){ openFrame('frameBattle'); renderBattle(); });
      $('toMapBtn').addEventListener('click', function(){ openFrame('frameMap'); renderMap(); });
      $('toPartyBtn').addEventListener('click', function(){ openFrame('frameParty'); renderParty(); });

      $('backBattle').addEventListener('click', function(){ openFrame('frameMain'); });
      $('backMap').addEventListener('click', function(){ openFrame('frameMain'); });
      $('backParty').addEventListener('click', function(){ openFrame('frameMain'); });
      $('backSub').addEventListener('click', function(){ openFrame('frameParty'); });

      $('battleRoundBtn').addEventListener('click', stepRound);
      $('battleAutoBtn').addEventListener('click', auto3);
      $('battleResetBtn').addEventListener('click', resetGame);

      $('heroTabs').addEventListener('click', function(ev){
        var id = ev.target && ev.target.dataset ? ev.target.dataset.hero : '';
        if (!id) return;
        selectedHeroId = id;
        selectedAction = 'basic';
        renderBattle();
      });

      $('actionGrid').addEventListener('click', function(ev){
        var actionId = ev.target && ev.target.dataset ? ev.target.dataset.action : '';
        if (!actionId) return;
        selectedAction = actionId;
        runSelectedAction();
      });

      $('partyGrid').addEventListener('click', function(ev){
        var unitId = ev.target && ev.target.closest ? (ev.target.closest('[data-unit]') || {}).dataset.unit : '';
        if (!unitId) return;
        currentUnitId = unitId;
        openFrame('frameSub');
        renderUnitSub();
      });

      $('travelButtons').addEventListener('click', function(ev){
        var id = ev.target && ev.target.dataset ? ev.target.dataset.travel : '';
        if (!id) return;
        travelToLocation(id);
      });

      $('mapPlane').addEventListener('click', function(ev){
        if (drag.moved) return;
        var id = ev.target && ev.target.dataset ? ev.target.dataset.loc : '';
        if (!id) return;
        travelToLocation(id);
      });

      var mapWrap = $('mapWrap');
      mapWrap.addEventListener('pointerdown', function(ev){ drag.active = true; drag.moved = false; drag.x = ev.clientX; drag.y = ev.clientY; mapWrap.setPointerCapture(ev.pointerId); });
      mapWrap.addEventListener('pointermove', function(ev){
        if (!drag.active) return;
        var dx = ev.clientX - drag.x;
        var dy = ev.clientY - drag.y;
        if (Math.abs(dx) + Math.abs(dy) > 2) drag.moved = true;
        drag.x = ev.clientX;
        drag.y = ev.clientY;
        state = lib.updateMapCamera(state, dx, dy);
        if ($('frameMap').classList.contains('frame-active')) renderMap();
      });
      mapWrap.addEventListener('pointerup', function(ev){ drag.active = false; mapWrap.releasePointerCapture(ev.pointerId); setTimeout(function(){ drag.moved = false; }, 0); });
      mapWrap.addEventListener('pointercancel', function(ev){ drag.active = false; mapWrap.releasePointerCapture(ev.pointerId); drag.moved = false; });

      renderAll();
    </script>
  </body>
</html>
