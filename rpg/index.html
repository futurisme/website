<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FadhiumRPG</title>
    <style>
      :root {
        color-scheme: dark;
        --bg:#040816;
        --panel:#0d1528;
        --line:#334155;
        --text:#dbeafe;
        --muted:#94a3b8;
        --accent:#2563eb;
      }
      * { box-sizing:border-box; min-width:0; }
      html, body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
      .shell { width:100vw; min-height:100dvh; padding:10px; }
      .frame { display:none; max-width:920px; margin:0 auto; }
      .frame.active { display:block; animation:fade .2s ease-out; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px; outline:1px solid rgba(148,163,184,.15); outline-offset:-1px; }
      h1,h2,p { margin:0; }
      .title { font-size:clamp(1.02rem,2.4vw,1.28rem); margin-bottom:4px; }
      .muted { color:var(--muted); font-size:.8rem; }
      .form { margin-top:10px; display:grid; gap:8px; }
      input, select, button {
        width:100%; border-radius:9px; border:1px solid #415174; background:#111d36; color:#e2e8f0;
        min-height:34px; padding:6px 10px; font-size:.82rem;
      }
      button { cursor:pointer; font-weight:650; }
      button.primary { background:linear-gradient(90deg,#4f46e5,#2563eb); border-color:transparent; }
      .split { margin-top:10px; display:grid; gap:8px; grid-template-columns:1fr 1fr; }
      .block { border:1px solid var(--line); border-radius:10px; padding:8px; background:#0a1226; }
      .intro-log {
        margin-top:10px; min-height:150px; max-height:230px; overflow:auto; border:1px solid var(--line);
        border-radius:10px; background:#060b18; padding:8px; white-space:pre-wrap; font:12px/1.5 ui-monospace, monospace;
      }
      .age-pick { margin-top:10px; display:grid; gap:6px; grid-template-columns:repeat(4,minmax(0,1fr)); }
      .stats { margin-top:10px; display:grid; gap:6px; grid-template-columns:repeat(4,minmax(0,1fr)); }
      .stat { border:1px solid var(--line); border-radius:9px; padding:6px; background:#0b162a; }
      .stat label { color:var(--muted); font-size:.72rem; display:block; }
      .stat strong { font-size:.85rem; }
      .timeline { margin-top:10px; border:1px solid var(--line); border-radius:10px; background:#070d1d; padding:8px; max-height:180px; overflow:auto; font:12px/1.45 ui-monospace, monospace; }
      .top-actions { margin-top:8px; display:flex; gap:6px; }
      @keyframes fade { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
      @media (max-width:760px){ .split, .stats { grid-template-columns:1fr 1fr; } .age-pick { grid-template-columns:1fr 1fr; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section id="frameRegister" class="frame active">
        <article class="card">
          <h1 class="title">FadhiumRPG</h1>
          <p class="muted">Petualangan personal. Mulai dari kelahiran, umur, dan takdir milikmu sendiri.</p>
          <div id="runtimeStatus" class="muted" style="margin-top:6px;">Status: inisialisasi...</div>
          <div class="form">
            <label class="muted" for="nameInput">Nama</label>
            <input id="nameInput" maxlength="32" placeholder="Masukkan nama" autocomplete="off" />
            <label class="muted" for="raceInput">Race</label>
            <select id="raceInput">
              <option value="humans">Humans</option>
              <option value="elves">Elves</option>
              <option value="dwarves">Dwarves</option>
            </select>
            <button class="primary" id="giveBirthBtn">Give birth</button>
          </div>
        </article>
      </section>

      <section id="frameIntro" class="frame">
        <article class="card">
          <h2 class="title">Cinematic Intro</h2>
          <p class="muted">Narasi emosional pembukaan hidupmu.</p>
          <div class="intro-log" id="introLog"></div>
          <div class="age-pick" id="agePick" style="display:none;">
            <button data-age="5">Start Age 5</button>
            <button data-age="6">Start Age 6</button>
            <button data-age="7">Start Age 7</button>
            <button data-age="8">Start Age 8</button>
          </div>
        </article>
      </section>

      <section id="frameMain" class="frame">
        <article class="card">
          <h2 class="title">Mainframe</h2>
          <p class="muted" id="identityText"></p>
          <div class="split">
            <div class="block" id="lifeMeta"></div>
            <div class="block" id="originMeta"></div>
          </div>
          <section class="stats" id="statsGrid"></section>
          <div class="top-actions">
            <button id="restBtn">Rest +1 day</button>
            <button id="focusBtn">Focus training</button>
          </div>
          <div class="timeline" id="lifeLog"></div>
        </article>
      </section>
    </main>

    <script>
      window.__FWRPG_BOOT__ = {
        libUrl: new URL('/rpg/fadhilwebrpglib.js', window.location.origin).toString()
      };
      window.__FWRPG_BOOT__.onLibLoadError = function () {
        var payload = {
          system: 'fadhilwebrpglib',
          kind: 'lib-load-failure',
          timestamp: new Date().toISOString(),
          href: window.location.href,
          attemptedScript: window.__FWRPG_BOOT__.libUrl,
          causes: [
            'Path script tidak valid / file tidak tersedia di deployment.',
            'Resource diblokir (404/403/CSP/MIME).',
            'Cache lama atau service worker mengarah ke aset tidak sinkron.'
          ],
          predictions: [
            'window.fadhilwebrpglib tetap undefined.',
            'Skenario kelahiran dan simulasi umur tidak akan berjalan.'
          ]
        };
        var wrap = document.createElement('section');
        wrap.style.cssText = 'position:fixed;left:12px;right:12px;bottom:12px;z-index:2147483647;background:#140b0b;border:1px solid #ef4444;border-radius:12px;padding:10px;color:#fecaca;font:12px/1.4 ui-monospace,monospace;';
        var text = document.createElement('pre');
        text.textContent = JSON.stringify(payload, null, 2);
        text.style.cssText = 'margin:0;max-height:42vh;overflow:auto;white-space:pre-wrap;word-break:break-word;';
        var copy = document.createElement('button');
        copy.textContent = 'Copy Debug';
        copy.style.cssText = 'margin-top:8px;border:1px solid #f87171;background:#7f1d1d;color:#fee2e2;border-radius:8px;padding:4px 8px;';
        copy.addEventListener('click', function () {
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text.textContent);
        }, { passive: true });
        wrap.appendChild(text);
        wrap.appendChild(copy);
        document.body.appendChild(wrap);
      };
    </script>
    <script src="/rpg/fadhilwebrpglib.js" onerror="window.__FWRPG_BOOT__ && window.__FWRPG_BOOT__.onLibLoadError && window.__FWRPG_BOOT__.onLibLoadError()"></script>
    <script>
      var lib = window.fadhilwebrpglib;
      var debugAgent = null;
      var rng = null;
      var profile = null;
      var personalState = null;
      var idleTimer = null;

      function $(id){ return document.getElementById(id); }
      function setRuntimeStatus(text, isError){
        var el = $('runtimeStatus');
        if (!el) return;
        if (!text) { el.textContent = ''; el.style.display = 'none'; el.style.color = ''; return; }
        el.style.display = '';
        el.textContent = 'Status: ' + text;
        el.style.color = isError ? '#fca5a5' : '';
      }
      function safe(fn){ return function(ev){ try { fn(ev); } catch (err) { setRuntimeStatus('error runtime - ' + err.message, true); if (debugAgent && debugAgent.report) debugAgent.report('interaction-error', { message: err.message, stack: err.stack || '', eventType: ev && ev.type ? ev.type : '' }); console.error(err); } }; }
      function openFrame(id){ ['frameRegister','frameIntro','frameMain'].forEach(function(fid){ $(fid).classList.toggle('active', fid === id); }); }

      function renderMain(){
        if (!personalState) return;
        var summary = lib.getPersonalSummary(personalState);
        $('identityText').textContent = summary.name + ' · ' + summary.race + ' · Born as ' + summary.bornAs;
        $('lifeMeta').innerHTML = '<strong>Timeline</strong><br/><span class="muted">' + summary.calendarText + '</span><br/>Total days: ' + summary.totalDays + '<br/>Energy: ' + summary.energy + ' · Mood: ' + summary.mood;
        $('originMeta').innerHTML = '<strong>Origin</strong><br/><span class="muted">Lahir di ' + summary.location + '</span><br/>Special skill: ' + summary.specialSkill;

        var entries = [
          ['Vitality', summary.stats.vitality], ['Intellect', summary.stats.intellect],
          ['Charisma', summary.stats.charisma], ['Craft', summary.stats.craft],
          ['Fortune', summary.stats.fortune], ['Age', summary.ageYears + 'y'],
          ['Race', summary.race], ['Status', 'Alive']
        ];
        $('statsGrid').innerHTML = entries.map(function(entry){ return '<article class="stat"><label>' + entry[0] + '</label><strong>' + entry[1] + '</strong></article>'; }).join('');
        $('lifeLog').textContent = personalState.logs.slice(-18).join('\n');
      }

      function startIdleClock(){
        if (idleTimer) clearInterval(idleTimer);
        idleTimer = setInterval(function(){
          if (!$('frameMain').classList.contains('active') || !personalState) return;
          personalState = lib.tickIdleDays(personalState, 1);
          if (personalState.totalDays % 5 === 0) personalState.logs.push('Hari ke-' + personalState.totalDays + ': kamu belajar memahami dunia.');
          renderMain();
        }, 1000);
      }

      function playIntro(){
        openFrame('frameIntro');
        $('introLog').textContent = '';
        $('agePick').style.display = 'none';
        var lines = profile.introLines.concat([
          'Nama: ' + profile.name,
          'Race: ' + profile.raceLabel,
          'Lahir di: ' + profile.birthPlace,
          'Keahlian khusus: ' + profile.specialSkill,
          'Born as: ' + profile.bornAsLabel,
          'Pilih Starting at age untuk memulai kehidupan...'
        ]);
        var idx = 0;
        var timer = setInterval(function(){
          if (idx >= lines.length) {
            clearInterval(timer);
            $('agePick').style.display = 'grid';
            return;
          }
          $('introLog').textContent += (idx ? '\n\n' : '') + lines[idx];
          $('introLog').scrollTop = $('introLog').scrollHeight;
          idx += 1;
        }, 680);
      }

      $('giveBirthBtn').addEventListener('click', safe(function(){
        if (!lib) return;
        var name = $('nameInput').value;
        var race = $('raceInput').value;
        profile = lib.createAdventureProfile({ name:name, race:race }, rng);
        playIntro();
      }));

      $('agePick').addEventListener('click', safe(function(ev){
        var age = ev.target && ev.target.dataset ? Number(ev.target.dataset.age || 0) : 0;
        if (!age) return;
        personalState = lib.createPersonalState(profile, age, rng);
        personalState.logs.push('Kamu memulai perjalanan pada umur ' + age + '.');
        openFrame('frameMain');
        renderMain();
        startIdleClock();
      }));

      $('restBtn').addEventListener('click', safe(function(){
        if (!personalState) return;
        personalState = lib.tickIdleDays(personalState, 1);
        personalState.energy = Math.min(100, personalState.energy + 8);
        personalState.logs.push('Kamu beristirahat, tubuhmu pulih.');
        renderMain();
      }));

      $('focusBtn').addEventListener('click', safe(function(){
        if (!personalState) return;
        personalState = lib.tickIdleDays(personalState, 1);
        personalState.stats.intellect += 1;
        personalState.mood = Math.max(20, personalState.mood - 1);
        personalState.logs.push('Latihan fokus meningkatkan Intellect +1.');
        renderMain();
      }));

      if (!lib) {
        setRuntimeStatus('gagal load fadhilwebrpglib.js', true);
      } else {
        debugAgent = lib.installOneShotDebug({ triggerParam: 'rpgdebug' });
        rng = lib.seededRandom(2026);
        setRuntimeStatus('', false);
      }
    </script>
  </body>
</html>
