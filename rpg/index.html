<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fadhil Web JRPG Lite</title>
    <style>
      body { font-family: system-ui, sans-serif; background:#111827; color:#f9fafb; margin:0; padding:24px; }
      .card { max-width:900px; margin:auto; background:#1f2937; border-radius:16px; padding:20px; }
      .row { display:flex; gap:16px; flex-wrap:wrap; }
      .panel { flex:1 1 260px; background:#111827; border-radius:12px; padding:12px; }
      button { background:#22c55e; border:0; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-line; font-size: 13px; opacity:.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Japanese RPG Super Ringan</h1>
      <p>Semua sistem battle ditangani oleh <strong>fadhilwebrpglib</strong> tanpa library eksternal.</p>
      <button id="turn">Jalankan 1 Turn</button>
      <div class="row" style="margin-top:14px;">
        <section class="panel"><h3>Party</h3><div id="party"></div></section>
        <section class="panel"><h3>Enemy</h3><div id="enemy"></div></section>
      </div>
      <h3>Log</h3>
      <div id="log" class="log"></div>
    </div>
    <script src="./fadhilwebrpglib.js"></script>
    <script>
      const party = [
        { id:'hero-akari',name:'Akari Ronin',level:8,maxHp:188,hp:188,maxMp:58,mp:58,attack:36,defense:24,agility:29,spirit:21,element:'wind',alive:true,skills:[{id:'sakura-edge',name:'Sakura Edge',costMp:7,power:24,element:'wind',variance:0.14}] },
        { id:'hero-ren',name:'Ren Onmyoji',level:8,maxHp:156,hp:156,maxMp:82,mp:82,attack:28,defense:20,agility:23,spirit:34,element:'water',alive:true,skills:[{id:'aqua-noctis',name:'Aqua Noctis',costMp:9,power:30,element:'water',variance:0.12}] }
      ];
      const enemies = [
        { id:'enemy-oni',name:'Oni Vanguard',level:8,maxHp:212,hp:212,maxMp:40,mp:40,attack:34,defense:30,agility:16,spirit:18,element:'earth',alive:true,skills:[{id:'basalt-crash',name:'Basalt Crash',costMp:6,power:22,element:'earth',variance:0.1}] },
        { id:'enemy-yoru',name:'Yoru Specter',level:8,maxHp:148,hp:148,maxMp:78,mp:78,attack:30,defense:18,agility:32,spirit:33,element:'shadow',alive:true,skills:[{id:'abyss-lance',name:'Abyss Lance',costMp:10,power:35,element:'shadow',variance:0.16}] }
      ];

      const rand = window.fadhilwebrpglib.seededRandom(42);
      let state = window.fadhilwebrpglib.createState(party, enemies);
      const partyNode = document.getElementById('party');
      const enemyNode = document.getElementById('enemy');
      const logNode = document.getElementById('log');

      function renderList(root, units){
        root.innerHTML = units.map(u => `${u.name} HP ${u.hp}/${u.maxHp} | MP ${u.mp}/${u.maxMp} ${u.alive ? '' : ' (KO)'}`).join('<br/>');
      }

      function render(){
        renderList(partyNode, state.party);
        renderList(enemyNode, state.enemies);
      }

      document.getElementById('turn').onclick = function(){
        if (window.fadhilwebrpglib.battleFinished(state)) return;
        const order = state.party.concat(state.enemies)
          .filter(u => u.alive)
          .sort((a,b)=>b.agility-a.agility)
          .map(u=>u.id);

        let logs = [];
        for (const actorId of order){
          if (window.fadhilwebrpglib.battleFinished(state)) break;
          const action = window.fadhilwebrpglib.autoAction(state, actorId);
          state = window.fadhilwebrpglib.execute(state, action, rand);
          logs = logs.concat(state.logs);
        }

        if (window.fadhilwebrpglib.battleFinished(state)) {
          logs.push(state.party.some(u=>u.alive) ? 'Menang!': 'Kalah, coba lagi.');
        }
        logNode.textContent = logs.join('\n');
        render();
      };

      render();
    </script>
  </body>
</html>
